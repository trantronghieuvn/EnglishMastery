        }

        function App() {
            const [words, setWords] = useState([]);
            const [progress, setProgress] = useState(INITIAL_PROGRESS);
            const [isLoaded, setIsLoaded] = useState(false);
            const [sessionActive, setSessionActive] = useState(false);
            const [hasUnsavedChanges, setHasUnsavedChanges] = useState(false);
            const [voices, setVoices] = useState([]);
            const [selectedVoiceURI, setSelectedVoiceURI] = useState(() => safeStorage.getItem('english_app_voice') || '');
            const [audioRate, setAudioRate] = useState(() => parseFloat(safeStorage.getItem('english_app_audio_rate') || '1.0'));
            const [sttEngineEn, setSttEngineEn] = useState(() => safeStorage.getItem('english_app_stt_engine_en') || 'browser');
            const [sttEngineVn, setSttEngineVn] = useState(() => safeStorage.getItem('english_app_stt_engine_vn') || 'groq');
            const [openaiKey, setOpenaiKey] = useState(() => safeStorage.getItem('english_app_openai_key') || '');
            const [googleKey, setGoogleKey] = useState(() => safeStorage.getItem('english_app_google_key') || '');
            const [groqKey, setGroqKey] = useState(() => safeStorage.getItem('english_app_groq_key') || '');
            const [fptKey, setFptKey] = useState(() => safeStorage.getItem('english_app_fpt_key') || '');
            const [viettelKey, setViettelKey] = useState(() => safeStorage.getItem('english_app_viettel_key') || '');
            const [localWhisperUrl, setLocalWhisperUrl] = useState(() => safeStorage.getItem('english_app_local_whisper_url') || '');

            const [appMode, setAppMode] = useState('dashboard');
            const [silentMode, setSilentMode] = useState(() => safeStorage.getItem('english_app_silent_mode') === 'true');
            const [skipHardWords, setSkipHardWords] = useState(() => { const val = safeStorage.getItem('english_app_skip_hard'); return val === null ? true : val === 'true'; });
            const [advancedMode, setAdvancedMode] = useState(() => safeStorage.getItem('english_app_advanced_mode') === 'true');
            const [fastReviewMode, setFastReviewMode] = useState(() => { const val = safeStorage.getItem('english_app_fast_mode'); return val === null ? true : val === 'true'; });
            const [restoreRatio, setRestoreRatio] = useState(() => { const val = safeStorage.getItem('english_app_restore_ratio'); return val !== null ? parseFloat(val) : 2.5; });
            const [micStrictness, setMicStrictness] = useState(() => safeStorage.getItem('english_app_mic_strictness') || 'easy');
            const [notification, setNotification] = useState(null);
            const [studyQueue, setStudyQueue] = useState([]);
            const [currentCardIndex, setCurrentCardIndex] = useState(0);
            const [currentStep, setCurrentStep] = useState(0);
            const [inboxZero, setInboxZero] = useState(false);

            const step2FailedRef = useRef(false);
            const currentCardIsHard = useRef(false);
            const sessionAccuracyRef = useRef({ total: 0, success: 0 });

            const [sessionStartTime, setSessionStartTime] = useState(0);
            const [cardsStudiedInSession, setCardsStudiedInSession] = useState(0);
            const [pomodoroTimeLeft, setPomodoroTimeLeft] = useState(POMODORO_DURATION_MS);
            const [isDistracted, setIsDistracted] = useState(false);
            const isReadyToSave = useRef(false);
            const [darkMode, setDarkMode] = useState(() => safeStorage.getItem('english_app_dark_mode') === 'true');

            const [lastSessionAR, setLastSessionAR] = useState(() => {
                const raw = safeStorage.getItem('english_app_last_session_ar');
                if (raw === null || raw === '') return null;
                const n = parseInt(raw, 10); return !isNaN(n) ? n : null;
            });

            const [sessionPlan, setSessionPlan] = useState(() => {
                try { return JSON.parse(safeStorage.getItem('english_app_session_plan')) || null; } catch { return null; }
            });

            const currentUserPhase = useMemo(() => {
                const srs = progress.srsData || {};
                const totalVoc = words.filter(w => parseInt(w.familyId) <= 500).length || 1;
                const vocMastered = words.filter(w => parseInt(w.familyId) <= 500 && srs[w.id]?.status === 2).length;
                const totalPro = words.filter(w => parseInt(w.familyId) > 500 && parseInt(w.familyId) <= 1000).length || 1;
                const proMastered = words.filter(w => parseInt(w.familyId) > 500 && parseInt(w.familyId) <= 1000 && srs[w.id]?.status === 2).length;
                const totalSup = words.filter(w => parseInt(w.familyId) > 1000).length || 1;
                const supMastered = words.filter(w => parseInt(w.familyId) > 1000 && srs[w.id]?.status === 2).length;

                let phase = 1;
                if (totalVoc > 0 && vocMastered >= totalVoc * 0.8) phase = 2;
                if (phase === 2 && totalPro > 0 && proMastered >= totalPro * 0.8) phase = 3;
                if (phase === 3 && totalSup > 0 && supMastered >= totalSup * 0.8) phase = 4;
                return phase;
            }, [words, progress.srsData]);

            useEffect(() => { if (sessionPlan) safeStorage.setItem('english_app_session_plan', JSON.stringify(sessionPlan)); }, [sessionPlan]);

            const flushSessionAR = () => {
                const { total, success } = sessionAccuracyRef.current;
                if (total > 0) {
                    const ar = Math.round((success / total) * 100);
                    setLastSessionAR(ar); safeStorage.setItem('english_app_last_session_ar', String(ar));
                }
                sessionAccuracyRef.current = { total: 0, success: 0 };
            };

            const missionHeaderStats = useMemo(() => {
                if (appMode !== 'mission') return null;
                const olLive = computeOverdueLoad(progress.srsData || {});
                const totalDebt = studyQueue.filter((item) => item.shouldCommit && item.reviewType !== 'new').length;
                const remainingDebt = studyQueue.slice(currentCardIndex).filter((item) => item.shouldCommit && item.reviewType !== 'new').length;
                const clearedDebt = Math.max(0, totalDebt - remainingDebt);
                const debtProgress = totalDebt > 0 ? Math.min(100, Math.round((clearedDebt / totalDebt) * 100)) : 100;
                return { olLive, sessionPlan, totalDebt, remainingDebt, debtProgress };
            }, [appMode, progress.srsData, sessionPlan, studyQueue, currentCardIndex]);

            useEffect(() => {
                const handleBeforeUnload = (e) => { if (hasUnsavedChanges) { e.preventDefault(); e.returnValue = ''; } };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [hasUnsavedChanges]);

            useEffect(() => {
                safeStorage.setItem('english_app_dark_mode', darkMode);
                if (darkMode) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            useEffect(() => {
                let wakeLock = null;
                const requestWakeLock = async () => { try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) { } };
                if (sessionActive) requestWakeLock();
                const handleVisibilityChange = () => { if (document.visibilityState === 'visible' && sessionActive) requestWakeLock(); };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                return () => { if (wakeLock !== null) wakeLock.release(); document.removeEventListener('visibilitychange', handleVisibilityChange); };
            }, [sessionActive]);

            useEffect(() => {
                let timeout;
                const resetTimer = () => {
                    setIsDistracted(false); clearTimeout(timeout);
                    if (appMode !== 'dashboard' && appMode !== 'pomodoro-break') timeout = setTimeout(() => setIsDistracted(true), 60000);
                };
                window.addEventListener('mousemove', resetTimer); window.addEventListener('keydown', resetTimer); window.addEventListener('touchstart', resetTimer); window.addEventListener('click', resetTimer);
                resetTimer();
                return () => { clearTimeout(timeout); window.removeEventListener('mousemove', resetTimer); window.removeEventListener('keydown', resetTimer); window.removeEventListener('touchstart', resetTimer); window.removeEventListener('click', resetTimer); };
            }, [appMode]);

            useEffect(() => {
                if (!sessionActive || appMode !== 'mission' || !sessionStartTime) {
                    if (appMode === 'dashboard') setPomodoroTimeLeft(POMODORO_DURATION_MS);
                    return;
                }

                const updatePomodoroTimeLeft = () => {
                    setPomodoroTimeLeft(Math.max(0, POMODORO_DURATION_MS - (Date.now() - sessionStartTime)));
                };

                const remainingTime = Math.max(0, POMODORO_DURATION_MS - (Date.now() - sessionStartTime));
                updatePomodoroTimeLeft();
                const countdownTimer = setInterval(updatePomodoroTimeLeft, 1000);
                const breakTimer = setTimeout(() => {
                    setIsDistracted(false);
                    setPomodoroTimeLeft(0);
                    setSessionActive(false);
                    setAppMode('pomodoro-break');
                }, remainingTime);

                return () => {
                    clearInterval(countdownTimer);
                    clearTimeout(breakTimer);
                };
            }, [appMode, sessionActive, sessionStartTime]);

            useEffect(() => {
                const updateVoices = () => { const v = window.speechSynthesis.getVoices(); if (v.length > 0) setVoices(v); };
                window.speechSynthesis.onvoiceschanged = updateVoices; updateVoices();
            }, []);

            const srsStats = useMemo(() => {
                let total = words.length;
                let untouched = 0, learning = 0, practicing = 0, mastered = 0;
                let overdue = 0, hard = 0;
                const now = Date.now(); const srs = progress.srsData || {};
                words.forEach(w => {
                    const data = srs[w.id] || { status: 0, failCount: 0, srsStep: 0, isHard: false, nextReview: 0 };
                    const state = getCardState(data);

                    if (state === 'untouched') untouched++;
                    else if (state === 'learning') learning++;
                    else if (state === 'practicing') practicing++;
                    else if (state === 'mastered') mastered++;

                    if (data.isHard) hard++;
                    // Overdue: any non-hard card with nextReview <= now
                    if (isCardOverdue(data, now)) overdue++;
                });
                return { total, untouched, learning, practicing, mastered, overdue, hard };
            }, [words, progress]);

            useEffect(() => {
                try {
                    const savedWords = safeStorage.getItem('english_app_words');
                    const savedProgress = safeStorage.getItem('english_app_progress');
                    const savedSilent = safeStorage.getItem('english_app_silent_mode');
                    const savedRatio = parseFloat(safeStorage.getItem('english_app_restore_ratio')) || 2.5;
                    if (savedWords) {
                        const pWords = JSON.parse(savedWords); setWords(upgradeWordsData(pWords)); setIsLoaded(true);
                        if (savedProgress) setProgress(upgradeProgressToALM(JSON.parse(savedProgress), pWords, savedRatio));
                    }
                    if (savedSilent) setSilentMode(JSON.parse(savedSilent));
                } catch (error) { } finally { setTimeout(() => { isReadyToSave.current = true; }, 500); }
            }, []);

            useEffect(() => { safeStorage.setItem('english_app_skip_hard', skipHardWords); }, [skipHardWords]);
            useEffect(() => { safeStorage.setItem('english_app_advanced_mode', advancedMode); }, [advancedMode]);
            useEffect(() => { safeStorage.setItem('english_app_fast_mode', fastReviewMode); }, [fastReviewMode]);
            useEffect(() => { safeStorage.setItem('english_app_audio_rate', audioRate); }, [audioRate]);
            useEffect(() => { safeStorage.setItem('english_app_restore_ratio', restoreRatio); }, [restoreRatio]);
            useEffect(() => { safeStorage.setItem('english_app_mic_strictness', micStrictness); }, [micStrictness]);
            useEffect(() => {
                safeStorage.setItem('english_app_stt_engine_en', sttEngineEn); safeStorage.setItem('english_app_stt_engine_vn', sttEngineVn); safeStorage.setItem('english_app_openai_key', openaiKey); safeStorage.setItem('english_app_google_key', googleKey); safeStorage.setItem('english_app_groq_key', groqKey); safeStorage.setItem('english_app_fpt_key', fptKey); safeStorage.setItem('english_app_viettel_key', viettelKey); safeStorage.setItem('english_app_local_whisper_url', localWhisperUrl);
            }, [sttEngineEn, sttEngineVn, openaiKey, googleKey, groqKey, fptKey, viettelKey, localWhisperUrl]);

            useEffect(() => {
                if (!isReadyToSave.current) return;
                if (isLoaded) { safeStorage.setItem('english_app_words', JSON.stringify(words)); safeStorage.setItem('english_app_progress', JSON.stringify(progress)); safeStorage.setItem('english_app_silent_mode', JSON.stringify(silentMode)); }
            }, [words, progress, isLoaded, silentMode]);

            const showNotification = (msg, type) => { setNotification({ msg, type }); setTimeout(() => setNotification(null), 3000); };

            const generateQueue = () => {
                const now = Date.now(); const srs = progress.srsData || {}; sessionAccuracyRef.current = { total: 0, success: 0 };
                let bridgeList = []; let overdueList = []; let newList = []; let hardList = [];

                words.forEach(w => {
                    const data = srs[w.id] || { status: 0, lastInteracted: 0, nextReview: 0, isHard: false, failCount: 0, srsStep: 0 };
                    const state = getCardState(data);

                    // Hard words go to separate list
                    if (state === 'practicing' && data.isHard) { hardList.push(w); return; }

                    // State 1 - Untouched: only these go to newList
                    if (state === 'untouched') { newList.push(w); return; }

                    // State 2,3,4 - Learning/Practicing/Mastered: check if overdue
                    if (isCardOverdue(data, now)) overdueList.push(w);

                    // Track bridge words for review continuity
                    if (data.lastInteracted > 0) bridgeList.push({ word: w, time: data.lastInteracted });
                });

                const sortByRoadmap = (a, b) => {
                    const aFam = parseInt(a.familyId, 10) || 0; const bFam = parseInt(b.familyId, 10) || 0;
                    if (aFam !== bFam) return aFam - bFam;
                    return (parseInt(a.id.split('-')[1], 10) || 0) - (parseInt(b.id.split('-')[1], 10) || 0);
                };

                newList.sort(sortByRoadmap);

                const takeWords = (sourceList, maxWords) => sourceList.slice(0, Math.max(0, maxWords));

                const buildAntiClusterBatches = (sourceList, batchSize = POMODORO_NEW_BATCH_SIZE) => {
                    const batches = [];
                    sourceList.forEach((word) => {
                        let placed = false;
                        for (const batch of batches) {
                            const families = new Set(batch.map((item) => String(item.familyId)));
                            if (batch.length < batchSize && !families.has(String(word.familyId))) {
                                batch.push(word); placed = true; break;
                            }
                        }
                        if (!placed) batches.push([word]);
                    });
                    return batches;
                };

                const stepAllowed = (stepId) => {
                    if (silentMode && ['pronunciation', 'root_reflex', 'double_reflex'].includes(stepId)) return false;
                    return true;
                };

                const buildNewBatchEntries = (selectedWords) => {
                    const entries = [];
                    const batches = buildAntiClusterBatches(selectedWords);
                    batches.forEach((batch, batchIndex) => {
                        const hasSynonyms = batch.some((w) => w.synonyms && w.synonyms.replace(/^"|"$/g, '').trim().length > 0);
                        const isAdvancedBatch = advancedMode;
                        let rounds = ['spelling', 'pronunciation', 'meaning_vn', 'root_reflex'];
                        if (hasSynonyms && isAdvancedBatch) rounds = ['spelling', 'pronunciation', 'meaning_vn', 'meaning_syn', 'root_reflex', 'check_syn', 'double_reflex'];
                        rounds = rounds.filter(stepAllowed);
                        const commitStepId = rounds[rounds.length - 1] || 'meaning_vn';

                        rounds.forEach((stepId, roundIndex) => {
                            batch.forEach((word, wordIndex) => {
                                entries.push({
                                    ...word,
                                    reviewType: 'new',
                                    forcedStepId: stepId,
                                    shouldCommit: stepId === commitStepId,
                                    batchId: batchIndex + 1,
                                    batchRound: roundIndex + 1,
                                    batchTotalRounds: rounds.length,
                                    wordIndexInBatch: wordIndex + 1,
                                    batchSize: batch.length
                                });
                            });
                        });
                    });
                    return entries;
                };

                const buildReviewEntries = (selectedWords, reviewType = 'review', extra = {}) => {
                    const steps = silentMode ? ['meaning_vn'] : ['meaning_vn', 'root_reflex'];
                    const commitStepId = steps[steps.length - 1];
                    const entries = [];

                    // Đảo ngược vòng lặp: Lặp qua các bước (rounds) trước, sau đó mới quét qua danh sách từ
                    steps.forEach((stepId, index) => {
                        // Tùy chọn: Có thể shuffle (xáo trộn) selectedWords ở mỗi vòng để chống học vẹt theo thứ tự
                        const currentRoundWords = [...selectedWords].sort(() => 0.5 - Math.random());

                        currentRoundWords.forEach((word) => {
                            entries.push({
                                ...word,
                                ...extra,
                                reviewType,
                                forcedStepId: stepId,
                                shouldCommit: stepId === commitStepId,
                                batchRound: index + 1,
                                batchTotalRounds: steps.length
                            });
                        });
                    });

                    return entries;
                };

                const ol = computeOverdueLoad(srs, now);
                const arInput = typeof lastSessionAR === 'number' && !isNaN(lastSessionAR) ? lastSessionAR : 80;
                const todayStr = new Date().toDateString();
                let currentPlan = sessionPlan;

                if (!currentPlan || currentPlan.date !== todayStr || (currentPlan.newWords <= 0 && currentPlan.reviewWords <= 0)) {
                    const targets = getStudyTargets(arInput, ol);
                    currentPlan = { date: todayStr, ol, state: targets.state, newWords: DAILY_NEW_TARGET, reviewWords: POMODORO_REVIEW_TARGET, dailyNewTarget: DAILY_NEW_TARGET };
                    setSessionPlan(currentPlan);
                }

                let targetNew = Math.max(0, Math.min(25, currentPlan.newWords ?? DAILY_NEW_TARGET));
                let targetReview = POMODORO_REVIEW_TARGET;
                let queue = [];

                overdueList.sort((a, b) => {
                    const aPhase = parseInt(a.familyId) <= 500 ? 1 : parseInt(a.familyId) <= 1000 ? 2 : parseInt(a.familyId) <= 1519 ? 3 : 4;
                    const bPhase = parseInt(b.familyId) <= 500 ? 1 : parseInt(b.familyId) <= 1000 ? 2 : parseInt(b.familyId) <= 1519 ? 3 : 4;
                    const aIsOldPhase = aPhase < currentUserPhase; const bIsOldPhase = bPhase < currentUserPhase;

                    if (advancedMode) { if (aIsOldPhase !== bIsOldPhase) return aIsOldPhase ? 1 : -1; }
                    else { if (aIsOldPhase !== bIsOldPhase) return aIsOldPhase ? -1 : 1; }

                    const aFam = parseInt(a.familyId, 10) || 0; const bFam = parseInt(b.familyId, 10) || 0;
                    if (aFam !== bFam) return aFam - bFam;
                    return (parseInt(a.id.split('-')[1], 10) || 0) - (parseInt(b.id.split('-')[1], 10) || 0);
                });

                hardList.sort(sortByRoadmap);
                bridgeList.sort((a, b) => b.time - a.time);
                const bridgeWords = bridgeList.slice(0, 5).map(i => i.word).filter(w => !srs[w.id]?.isHard);
                const bridgeIds = bridgeWords.map(w => w.id);
                overdueList = overdueList.filter(w => !bridgeIds.includes(w.id));

                const overloadMode = overdueList.length > REVIEW_OVERLOAD_SOFT_CAP;
                if (overloadMode && !fastReviewMode) {
                    setFastReviewMode(true);
                    showNotification("Đang bật chế độ giảm tải nợ.", "info");
                }

                const pulledNew = takeWords(newList, Math.min(POMODORO_NEW_BATCH_SIZE, targetNew));
                const hardWords = skipHardWords ? [] : takeWords(hardList, POMODORO_HARD_TARGET);
                const reviewPool = [...bridgeWords, ...overdueList].filter((v, i, a) => a.findIndex(t => t.id === v.id) === i);
                const pulledOverdue = takeWords(reviewPool, Math.max(0, targetReview - hardWords.length));

                queue.push(...buildReviewEntries(hardWords, 'hard', { forceMicStrictness: 'easy', fastReviewMode: true }));
                queue.push(...buildReviewEntries(pulledOverdue, 'review', { fastReviewMode: overloadMode }));
                queue.push(...buildNewBatchEntries(pulledNew));

                if (queue.length === 0) {
                    showNotification("Bạn đã học xong toàn bộ lộ trình hiện có!", "info");
                    setInboxZero(true);
                    setStudyQueue([]);
                    setSessionActive(false);
                    return;
                }

                if (targetNew <= 0 && newList.length > 0) showNotification("Đã đạt giới hạn 25 từ mới/ngày.", "info");
                setInboxZero(false); setStudyQueue(queue); setCurrentCardIndex(0); setCurrentStep(0); setPreviousTranscript(null);
                step2FailedRef.current = false; currentCardIsHard.current = false;
                setSessionStartTime(Date.now()); setCardsStudiedInSession(0); setPomodoroTimeLeft(POMODORO_DURATION_MS); setSessionActive(true);
            };

            const startSession = () => { setAppMode('mission'); generateQueue(); };

            const handleFileUpload = (e) => {
                const file = e.target.files?.[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const parsed = parseCSV(evt.target.result);
                        if (!parsed.length) throw new Error("No data");
                        setWords(parsed); setIsLoaded(true); setHasUnsavedChanges(true);
                        if (confirm("Reset hoàn toàn tiến độ để bắt đầu bộ từ mới?")) setProgress(INITIAL_PROGRESS);
                        isReadyToSave.current = true; showNotification(`Đã tải ${parsed.length} từ!`, 'success');
                    } catch (err) { showNotification("Lỗi file CSV", 'error'); }
                }; reader.readAsText(file);
            };

            const resetProgress = () => {
                if (confirm("Xóa toàn bộ dữ liệu (Bao gồm từ vựng và tiến độ)?")) {
                    setProgress(INITIAL_PROGRESS); setWords([]); setIsLoaded(false); setAppMode('dashboard'); setSessionActive(false); setHasUnsavedChanges(false);
                    safeStorage.removeItem('english_app_progress'); safeStorage.removeItem('english_app_words'); safeStorage.removeItem('english_app_last_session_ar');
                    setLastSessionAR(null); setSessionPlan(null); showNotification("Đã xóa toàn bộ.", 'info');
                }
            };

            // --- BỔ SUNG LOGIC KHÔI PHỤC MỤC TIÊU NGÀY QUA FILE BACKUP ---
            const handleUploadNewFromDashboard = (data) => {
                setWords(upgradeWordsData(data.words)); setProgress(upgradeProgressToALM(data.progress, data.words, restoreRatio));
                if (typeof data.silentMode !== 'undefined') setSilentMode(data.silentMode);
                if (typeof data.fastReviewMode !== 'undefined') setFastReviewMode(data.fastReviewMode);

                if (data.sessionPlan) {
                    const todayStr = new Date().toDateString();
                    if (data.sessionPlan.date === todayStr) {
                        setSessionPlan(data.sessionPlan);
                    }
                }

                setHasUnsavedChanges(false); showNotification("Khôi phục và nâng cấp dữ liệu thành công!", 'success');
            };

            const activeWord = studyQueue[currentCardIndex];

            const activeSteps = useMemo(() => {
                if (!activeWord) return [];
                const hasSynonyms = activeWord.synonyms && activeWord.synonyms.replace(/^"|"$/g, '').trim().length > 0;
                const wFam = parseInt(activeWord.familyId, 10);
                const wPhase = wFam <= 500 ? 1 : wFam <= 1000 ? 2 : wFam <= 1519 ? 3 : 4;
                const isOldPhase = wPhase < currentUserPhase;

                const s1 = { id: 'spelling', label: 'Nghe & Chép', component: SpellingStep };
                const s2 = { id: 'pronunciation', label: 'Luyện âm', component: PronunciationStep };
                const s3 = { id: 'meaning_vn', label: 'Chọn nghĩa VN', component: MeaningVNStep };
                const s4 = { id: 'root_reflex', label: 'Phản xạ gốc', component: RootReflexStep };
                const s5 = { id: 'meaning_syn', label: 'Chọn Synonym', component: MeaningSynonymStep };
                const s6 = { id: 'check_syn', label: 'Check Synonym', component: SynonymMeaningStep };
                const s7 = { id: 'double_reflex', label: 'Phản xạ kép', component: DoubleReflexStep };
                const stepMap = { spelling: s1, pronunciation: s2, meaning_vn: s3, root_reflex: s4, meaning_syn: s5, check_syn: s6, double_reflex: s7 };

                if (activeWord.forcedStepId) {
                    const forcedStep = stepMap[activeWord.forcedStepId] || s3;
                    const prefix = activeWord.reviewType === 'new'
                        ? `Lô ${activeWord.batchId} · Vòng ${activeWord.batchRound}/${activeWord.batchTotalRounds}`
                        : activeWord.reviewType === 'hard'
                            ? `Khám lại từ khó · Bước ${activeWord.batchRound}/${activeWord.batchTotalRounds}`
                            : `Ôn nhanh · Bước ${activeWord.batchRound}/${activeWord.batchTotalRounds}`;
                    return [{ ...forcedStep, label: `${prefix}: ${forcedStep.label}` }];
                }

                let rawSteps = ['spelling', 'pronunciation', 'meaning_vn', 'root_reflex'];
                let shouldAddAdvancedSteps = false;

                if (advancedMode) shouldAddAdvancedSteps = true;

                if (hasSynonyms && shouldAddAdvancedSteps) rawSteps.push('meaning_syn', 'check_syn', 'double_reflex');

                let finalSteps = [];
                rawSteps.forEach(stepId => {
                    if (stepId === 'spelling') finalSteps.push(s1);
                    if (stepId === 'pronunciation' && !silentMode) finalSteps.push(s2);
                    if (stepId === 'meaning_vn') finalSteps.push(s3);
                    if (stepId === 'root_reflex' && !silentMode) finalSteps.push(s4);
                    if (stepId === 'meaning_syn') finalSteps.push(s5);
                    if (stepId === 'check_syn') finalSteps.push(s6);
                    if (stepId === 'double_reflex') {
                        if (!silentMode) finalSteps.push(s7); else finalSteps.push(s6);
                    }
                });

                finalSteps = finalSteps.filter((v, i, a) => a.findIndex(t => (t.id === v.id)) === i);
                if (finalSteps.length === 0) finalSteps.push(s3);
                return finalSteps.map((s, idx) => ({ ...s, label: `B.${idx + 1}: ${s.label.split(': ')[1] || s.label}` }));
            }, [activeWord, silentMode, advancedMode, currentUserPhase]);

            const [previousTranscript, setPreviousTranscript] = useState(null);
            const lastCompleteTimeRef = useRef(0);

            const advanceQueueEntry = () => {
                if (currentCardIndex + 1 < studyQueue.length) {
                    setCurrentCardIndex(prev => prev + 1); setCurrentStep(0); setPreviousTranscript(null);
                    if (step2FailedRef) step2FailedRef.current = false;
                    currentCardIsHard.current = false;
                } else {
                    flushSessionAR(); setInboxZero(true); setSessionActive(false);
                }
            };

            const handleStepComplete = (isPass, isHard = false, action = 'next') => {
                const now = Date.now();
                if (now - lastCompleteTimeRef.current < 800) return;
                lastCompleteTimeRef.current = now;

                if (activeWord?.forcedStepId) {
                    if (!activeWord.shouldCommit) {
                        advanceQueueEntry();
                        return;
                    }
                    finishCard(Boolean(isPass) && !isHard, action);
                    return;
                }

                if (!isPass) step2FailedRef.current = true;
                if (isHard) currentCardIsHard.current = true;

                let nextStepIndex = currentStep + 1;
                if (nextStepIndex < activeSteps.length) setCurrentStep(nextStepIndex);
                else finishCard(!step2FailedRef.current && !currentCardIsHard.current);
            };

            const finishCard = (isSuccess, action = 'next') => {
                const now = Date.now();
                sessionAccuracyRef.current.total += 1;
                if (isSuccess) sessionAccuracyRef.current.success += 1;
                setHasUnsavedChanges(true);

                setProgress(prev => {
                    const newSrs = { ...prev.srsData };
                    const cardData = newSrs[activeWord.id] || { status: 0, srsStep: 0, nextReview: 0, failCount: 0, lastInteracted: 0, isHard: false };
                    let nextStep = cardData.srsStep; let nextStatus = cardData.status;
                    const protectedFastReview = fastReviewMode || activeWord.fastReviewMode || activeWord.reviewType === 'hard';

                    if (isSuccess) {
                        nextStep = Math.min(SRS_INTERVALS.length - 1, nextStep + 2);
                        nextStatus = nextStep >= SRS_INTERVALS.length - 1 ? 2 : 1;
                    } else {
                        if (!protectedFastReview) nextStep = Math.max(1, nextStep - 1);
                        // FIX BUG: When card with status=0 fails, transition to Learning (status=1)
                        if (cardData.status === 0) {
                            nextStatus = 1; // Move from Untouched to Learning
                            nextStep = Math.max(1, nextStep); // Ensure step is at least 1
                        }
                        cardData.failCount += 1;
                    }

                    const shouldClearHard = action === 'clearHard' || (isSuccess && activeWord.reviewType === 'hard');
                    newSrs[activeWord.id] = { ...cardData, status: nextStatus, srsStep: nextStep, nextReview: now + SRS_INTERVALS[nextStep], lastInteracted: now, isHard: shouldClearHard ? false : !isSuccess };
                    return { ...prev, srsData: newSrs };
                });

                if (isSuccess) {
                    setSessionPlan(prev => {
                        if (!prev) return null;
                        const isNewWord = activeWord.reviewType === 'new';
                        return { ...prev, newWords: isNewWord ? Math.max(0, prev.newWords - 1) : prev.newWords, reviewWords: !isNewWord ? Math.max(0, prev.reviewWords - 1) : prev.reviewWords };
                    });
                }

                advanceQueueEntry();
            };

            const handleCloseSession = () => { flushSessionAR(); setInboxZero(false); setStudyQueue([]); setAppMode('dashboard'); setSessionActive(false); };

            const sttConfig = { engineEn: sttEngineEn, engineVn: sttEngineVn, openaiKey, googleKey, groqKey, localWhisperUrl, fptKey, viettelKey };

            if (!isLoaded) {
                return <InitialScreen onUpload={handleFileUpload} onRestore={(e) => {
                    const file = e.target.files?.[0]; if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        try {
                            const data = JSON.parse(evt.target.result);
                            if (data.words && data.progress) {
                                setWords(upgradeWordsData(data.words));
                                const loadedRatio = parseFloat(safeStorage.getItem('english_app_restore_ratio')) || 2.5;
                                setProgress(upgradeProgressToALM(data.progress, data.words, loadedRatio));
                                setIsLoaded(true);
                                if (typeof data.silentMode !== 'undefined') setSilentMode(data.silentMode);
                                if (typeof data.fastReviewMode !== 'undefined') setFastReviewMode(data.fastReviewMode);

                                // Khôi phục lại sessionPlan nếu có trong file Backup
                                if (data.sessionPlan) {
                                    const todayStr = new Date().toDateString();
                                    if (data.sessionPlan.date === todayStr) {
                                        setSessionPlan(data.sessionPlan);
                                    }
                                }

                                setHasUnsavedChanges(false); showNotification("Đã khôi phục dữ liệu ALM!", 'success');
                            } else { showNotification("File không hợp lệ", 'error'); }
                        } catch (err) { showNotification("Lỗi đọc file", 'error'); }
                    };
                    reader.readAsText(file);
                }} darkMode={darkMode} setDarkMode={setDarkMode} />;
            }

            if (appMode === 'dashboard') {
                return (
                    <React.Fragment>
                        <Dashboard words={words} progress={progress} srsStats={srsStats} onStartMission={() => startSession('mission')} onReset={resetProgress} onUploadCSV={handleFileUpload} onRestoreJSON={handleUploadNewFromDashboard} silentMode={silentMode} setSilentMode={setSilentMode} skipHardWords={skipHardWords} setSkipHardWords={setSkipHardWords} fastReviewMode={fastReviewMode} setFastReviewMode={setFastReviewMode} advancedMode={advancedMode} setAdvancedMode={setAdvancedMode} showNotification={showNotification} voices={voices} selectedVoiceURI={selectedVoiceURI} setSelectedVoiceURI={setSelectedVoiceURI} darkMode={darkMode} setDarkMode={setDarkMode} sttEngineEn={sttEngineEn} setSttEngineEn={setSttEngineEn} sttEngineVn={sttEngineVn} setSttEngineVn={setSttEngineVn} openaiKey={openaiKey} setOpenaiKey={setOpenaiKey} googleKey={googleKey} setGoogleKey={setGoogleKey} groqKey={groqKey} setGroqKey={setGroqKey} fptKey={fptKey} setFptKey={setFptKey} viettelKey={viettelKey} setViettelKey={setViettelKey} localWhisperUrl={localWhisperUrl} setLocalWhisperUrl={setLocalWhisperUrl} restoreRatio={restoreRatio} setRestoreRatio={setRestoreRatio} micStrictness={micStrictness} setMicStrictness={setMicStrictness} hasUnsavedChanges={hasUnsavedChanges} setHasUnsavedChanges={setHasUnsavedChanges} lastSessionAR={lastSessionAR} sessionPlan={sessionPlan} />
                    </React.Fragment>
                );
            }

            if (appMode === 'pomodoro-break') {
                return <PomodoroBreak onResume={() => {
                    setSessionStartTime(Date.now()); setCardsStudiedInSession(0); setPomodoroTimeLeft(POMODORO_DURATION_MS);
                    if (currentCardIndex < studyQueue.length) {
                        setAppMode('mission'); setSessionActive(true);
                    } else { setAppMode('dashboard'); }
                }} />;
            }

            if (inboxZero) {
                return (
                    <div className="fixed inset-0 bg-gray-50 dark:bg-gray-900 flex items-center justify-center p-6">
                        <div className="w-full max-w-sm text-center">
                            <CheckCircle size={88} className="mx-auto mb-5 text-emerald-300 dark:text-emerald-400" />
                            <h2 className="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-2">Hoàn tất.</h2>
                            <p className="text-sm text-gray-500 dark:text-gray-400 mb-8">Bộ nhớ đệm đã được giải phóng.</p>
                            <button onClick={() => { setInboxZero(false); setAppMode('dashboard'); }} className="px-5 py-3 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-xl font-bold text-sm shadow-sm">Quay về Tổng quan</button>
                        </div>
                    </div>
                );
            }

            if (!activeWord || activeSteps.length === 0) return <div className="p-4">Đang tính toán thuật toán...</div>;

            const StepComponent = activeSteps[currentStep].component;
            const stepLabelText = activeSteps[currentStep].label;

            return (
                <div className="fixed inset-0 bg-gray-50 dark:bg-gray-900 flex flex-col font-sans">
                    {isDistracted && (
                        <div className="fixed inset-0 bg-blue-900/90 z-50 flex flex-col items-center justify-center p-6 text-white animate-pop backdrop-blur-sm">
                            <Activity size={80} className="mb-6 text-blue-300 animate-pulse" />
                            <h2 className="text-3xl font-bold mb-4 text-center">Bạn đang mất tập trung?</h2>
                            <p className="text-blue-100 mb-6 text-center max-w-sm text-lg">Đã 1 phút rồi chưa thấy bạn tương tác. Hãy hít một hơi sâu và quay lại bài học nhé!</p>

                            <div className="bg-blue-800/50 p-4 rounded-xl mb-8 border border-blue-400/30">
                                <p className="text-sm text-blue-200 font-bold uppercase mb-1">Giám sát phiên học</p>
                                <p className="text-xl font-bold text-white text-center">Nợ ôn tập hiện tại: {missionHeaderStats?.olLive ?? 0} thẻ</p>
                                {missionHeaderStats?.sessionPlan && (
                                    <p className="text-xs text-blue-100 mt-2 text-center leading-relaxed">Mục tiêu đã ghim cho phiên này: <strong>{missionHeaderStats.sessionPlan.newWords}</strong> từ mới, <strong>{missionHeaderStats.sessionPlan.reviewWords}</strong> từ ôn · Trạng thái kế: <strong>{missionHeaderStats.sessionPlan.state}</strong></p>
                                )}
                            </div>
                            <button onClick={() => setIsDistracted(false)} className="px-8 py-4 bg-white text-blue-900 rounded-full font-bold shadow-xl hover:scale-105 transition-transform text-lg">Tiếp tục học ngay!</button>
                        </div>
                    )}

                    <header className="bg-white dark:bg-gray-800 shadow-sm px-2 sm:px-3 py-2 flex justify-between items-center shrink-0 z-20 overflow-x-auto custom-scroll border-b border-gray-100 dark:border-gray-700">
                        <div className="flex items-center gap-1.5 sm:gap-2 shrink-0">
                            <div className="bg-indigo-600 dark:bg-indigo-500 text-white p-1 rounded font-bold text-xs sm:text-sm cursor-pointer" onClick={handleCloseSession}>ALM</div>
                            <div className="flex flex-col ml-1">
                                <span className="text-[10px] sm:text-xs font-bold text-indigo-800 dark:text-indigo-200 bg-indigo-100 dark:bg-indigo-900/40 border border-indigo-200 dark:border-indigo-700/50 px-1.5 sm:px-2 py-0.5 rounded-md whitespace-nowrap">Nợ ôn tập hiện tại: {missionHeaderStats?.olLive ?? 0} thẻ</span>
                                <div className="mt-1 h-1 w-[150px] sm:w-[220px] rounded-full bg-gray-200 dark:bg-gray-700 overflow-hidden">
                                    <div className="h-full bg-gray-400 dark:bg-gray-300 transition-all" style={{ width: `${missionHeaderStats?.debtProgress ?? 0}%` }}></div>
                                </div>
                                {sessionPlan && (
                                    <span className="text-[9px] font-medium text-gray-500 mt-0.5 whitespace-nowrap">Mục tiêu phiên: Nạp <b className="text-orange-600">{sessionPlan.newWords}</b> từ mới, Ôn <b className="text-orange-600">{sessionPlan.reviewWords}</b> thẻ cũ</span>
                                )}
                            </div>
                        </div>
                        <div className="flex items-center gap-1 sm:gap-2 shrink-0 ml-2">
                            <div className={`flex items-center gap-1 px-2.5 py-1 rounded-full border text-[10px] sm:text-xs font-bold tabular-nums ${pomodoroTimeLeft <= 60 * 1000 ? 'bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-300 border-red-200 dark:border-red-800' : 'bg-emerald-50 dark:bg-emerald-900/25 text-emerald-700 dark:text-emerald-300 border-emerald-200 dark:border-emerald-800'}`}>
                                <Clock size={12} />
                                <span>{formatPomodoroTime(pomodoroTimeLeft)}</span>
                                {IS_POMODORO_TEST_MODE && <span className="hidden sm:inline text-[9px] opacity-75">TEST</span>}
                            </div>
                            <div className="flex items-center bg-gray-100 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-full px-1.5 py-1">
                                <Volume2 size={12} className="text-gray-500 dark:text-gray-400 mr-1 hidden sm:block" />
                                <select value={audioRate} onChange={(e) => setAudioRate(parseFloat(e.target.value))} className="bg-transparent text-gray-600 dark:text-gray-300 text-[10px] sm:text-xs font-semibold outline-none cursor-pointer">
                                    <option value="1">1.0x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option><option value="1.75">1.75x</option><option value="2">2.0x</option>
                                </select>
                            </div>
                            <button onClick={() => setSilentMode(!silentMode)} className={`flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] sm:text-xs font-semibold transition-all ${silentMode ? 'bg-orange-100 dark:bg-orange-900/30 text-orange-700 dark:text-orange-400 border border-orange-200 dark:border-orange-800' : 'bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-300 border border-gray-200 dark:border-gray-600'}`}>
                                {silentMode ? <MicOff size={12} /> : <Mic size={12} />} <span className="hidden sm:block">{silentMode ? "Tắt Mic" : "Bật Mic"}</span>
                            </button>
                            <DarkModeToggle isDark={darkMode} onToggle={() => setDarkMode(!darkMode)} />
                            <button onClick={handleCloseSession} className="p-1 hover:bg-gray-100 dark:bg-gray-700 rounded-full text-gray-400 dark:text-gray-500"><XCircle size={20} /></button>
                        </div>
                    </header>

                    {silentMode && <div className="w-full text-center text-[10px] text-orange-500 dark:text-orange-400 bg-orange-50 dark:bg-orange-900/20 py-1 font-bold animate-pulse border-b border-orange-100 dark:border-orange-800/50">*Đang bật chế độ Im lặng (Các bước Luyện nói bị ẩn)*</div>}

                    <main className="flex-1 w-full max-w-2xl mx-auto sm:p-3 flex flex-col overflow-hidden relative">
                        <div className="flex-1 min-h-0 bg-white dark:bg-gray-800 sm:rounded-xl shadow-sm border-t border-gray-100 dark:border-gray-700 sm:border overflow-hidden flex flex-col relative w-full sm:mb-2">
                            {notification && <div className={`absolute top-0 left-0 right-0 p-1.5 text-center text-white text-xs font-medium z-50 animate-fade-in ${notification.type === 'success' ? 'bg-green-500' : notification.type === 'info' ? 'bg-orange-400' : 'bg-red-500'}`}>{notification.msg}</div>}
                            <StepComponent key={activeWord.id + currentStep + (activeWord.forcedStepId || '')} word={activeWord} wordsList={words} onComplete={handleStepComplete} voices={voices} selectedVoiceURI={selectedVoiceURI} audioRate={audioRate} isHard={progress.srsData[activeWord.id]?.isHard || activeWord.reviewType === 'hard'} stepLabel={stepLabelText} silentMode={silentMode} sttConfig={sttConfig} micStrictness={activeWord.forceMicStrictness || micStrictness} previousTranscript={previousTranscript} setPreviousTranscript={setPreviousTranscript} />
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
