<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mastery - ALM Engine v2.5</title>
    <style>
        :root {
            --bg-primary: #f9fafb;
            --bg-secondary: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --accent: #6366f1;
            --accent-light: #e0e7ff;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }
        .dark {
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent: #818cf8;
            --accent-light: #312e81;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 16px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--accent-light); color: var(--accent); }
        .btn-success { background: var(--success); color: white; }
        .btn-error { background: var(--error); color: white; }
        .text-center { text-align: center; }
        .text-2xl { font-size: 1.5rem; }
        .text-xl { font-size: 1.25rem; }
        .text-lg { font-size: 1.125rem; }
        .font-bold { font-weight: 700; }
        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }
        .mt-2 { margin-top: 8px; }
        .mb-2 { margin-bottom: 8px; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .gap-2 { gap: 8px; }
        .gap-4 { gap: 16px; }
        .w-full { width: 100%; }
        .h-screen { height: 100vh; }
        .hidden { display: none; }
        
        /* Upload Zone */
        .upload-zone {
            border: 2px dashed var(--accent);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .upload-zone:hover { background: var(--accent-light); }
        .upload-zone input { display: none; }
        
        /* Study Screen */
        .study-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .progress-bar {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }
        .step-indicator {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
        }
        .word-display {
            text-align: center;
            padding: 40px 20px;
        }
        .word-text {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .pos-tag {
            display: inline-block;
            padding: 2px 8px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }
        
        /* Input */
        .answer-input {
            width: 100%;
            padding: 16px;
            font-size: 1.25rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .answer-input:focus { border-color: var(--accent); }
        .answer-input.error { border-color: var(--error); }
        .answer-input.correct { border-color: var(--success); }
        
        /* Buttons */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn-group .btn { flex: 1; }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 16px;
        }
        .stat-item {
            text-align: center;
            padding: 16px;
            background: var(--accent-light);
            border-radius: 12px;
        }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .animate-shake { animation: shake 0.3s ease-in-out; }
        
        /* Icons */
        .icon { display: inline-block; width: 24px; height: 24px; }
    </style>
</head>
<body>
    <!-- Initial Screen -->
    <div id="initial-screen" class="h-screen flex items-center justify-center p-4">
        <div class="card max-w-md w-full text-center">
            <div class="text-6xl mb-4">🧠</div>
            <h1 class="text-2xl font-bold mb-2">English Mastery</h1>
            <p class="text-lg text-secondary mb-8" style="color: var(--text-secondary)">Hệ thống Luyện trí nhớ ALM Engine</p>
            
            <label class="upload-zone mb-4">
                <div class="text-4xl mb-2">📁</div>
                <div class="text-lg font-semibold">Tải file CSV (Từ mới)</div>
                <input type="file" accept=".csv" onchange="handleCSVUpload(event)">
            </label>
            
            <div class="flex items-center gap-4 mb-4">
                <div style="flex: 1; height: 1px; background: var(--text-secondary); opacity: 0.3;"></div>
                <span style="color: var(--text-secondary); font-size: 12px;">Hoặc</span>
                <div style="flex: 1; height: 1px; background: var(--text-secondary); opacity: 0.3;"></div>
            </div>
            
            <label class="card cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition" style="cursor: pointer;">
                <div class="flex items-center justify-center gap-2">
                    <span>📥</span>
                    <span class="font-medium">Khôi phục tiến độ (.json)</span>
                </div>
                <input type="file" accept=".json" class="hidden" onchange="handleRestore(event)">
            </label>
            
            <div class="mt-6 flex justify-center gap-4">
                <button onclick="toggleDarkMode()" class="btn btn-secondary">🌓</button>
                <button onclick="exportProgress()" class="btn btn-secondary">💾 Lưu</button>
            </div>
        </div>
    </div>
    
    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="hidden">
        <div class="header">
            <div class="font-bold" style="color: var(--accent);">ALM</div>
            <div class="flex gap-2">
                <button onclick="toggleDarkMode()" class="btn btn-secondary">🌓</button>
                <button onclick="startNewSession()" class="btn btn-primary">🎯 Bắt đầu học</button>
            </div>
        </div>
        
        <div class="container">
            <div class="card">
                <h2 class="text-xl font-bold mb-4">📊 Thống kê</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="total-words">0</div>
                        <div class="stat-label">Tổng từ</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="due-count">0</div>
                        <div class="stat-label">Cần ôn</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="mastered-count">0</div>
                        <div class="stat-label">Đã thuộc</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h2 class="text-xl font-bold mb-4">🎯 Phiên học</h2>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="startStudySession('new')" class="btn btn-primary">📖 Từ mới</button>
                    <button onclick="startStudySession('review')" class="btn btn-secondary">🔄 Ôn tập</button>
                    <button onclick="startStudySession('all')" class="btn btn-secondary">📚 Tất cả</button>
                </div>
            </div>
            
            <div class="card">
                <h2 class="text-xl font-bold mb-4">💾 Quản lý</h2>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="exportProgress()" class="btn btn-secondary">💾 Lưu progress</button>
                    <button onclick="document.getElementById('import-file').click()" class="btn btn-secondary">📂 Import thêm</button>
                    <input type="file" id="import-file" accept=".csv" class="hidden" onchange="handleCSVUpload(event)">
                </div>
            </div>
        </div>
    </div>
    
    <!-- Study Screen -->
    <div id="study-screen" class="hidden">
        <div class="study-header">
            <div class="flex items-center gap-2">
                <span class="font-bold" style="color: var(--accent); padding: 4px 8px; background: var(--accent-light); border-radius: 4px; font-size: 12px;">ALM</span>
                <span class="text-sm" style="color: var(--text-secondary);">
                    Nợ ôn: <b id="study-debt">0</b> thẻ
                </span>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="closeStudy()" class="btn" style="background: transparent; padding: 8px;">✕</button>
            </div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="study-progress" style="width: 0%"></div>
        </div>
        
        <div class="container">
            <div class="card" id="step-container">
                <!-- Step content will be injected here -->
            </div>
        </div>
    </div>
    
    <!-- Complete Screen -->
    <div id="complete-screen" class="hidden h-screen flex items-center justify-center p-4">
        <div class="card max-w-md w-full text-center animate-fade-in">
            <div class="text-6xl mb-4">✅</div>
            <h2 class="text-2xl font-bold mb-2">Hoàn tất!</h2>
            <p class="mb-4" style="color: var(--text-secondary)">Bộ nhớ đệm đã được giải phóng.</p>
            <button onclick="backToDashboard()" class="btn btn-primary w-full"> Quay về Tổng quan</button>
        </div>
    </div>

<script>
// ============================================================
// ALM ENGINE v2.5 - VANILLA JS VERSION
// Giữ nguyên thuật toán SRS, viết lại UI bằng Vanilla JS
// ============================================================

// SRS Intervals (in milliseconds)
const SRS_INTERVALS = [
    0,                      // Step 0: immediate
    60000,                  // Step 1: 1 minute
    600000,                 // Step 2: 10 minutes
    3600000,                // Step 3: 1 hour
    43200000,               // Step 4: 12 hours
    86400000,               // Step 5: 1 day
    259200000,              // Step 6: 3 days
    604800000,              // Step 7: 1 week
    1209600000,             // Step 8: 2 weeks
    2592000000,             // Step 9: 1 month
];

// Constants
const DAILY_NEW_TARGET = 20;
const POMODORO_REVIEW_TARGET = 50;

// ============================================================
// STATE MANAGEMENT
// ============================================================
let state = {
    words: [],
    srsData: {},
    currentSessionId: null,
    darkMode: false,
    studyQueue: [],
    currentIndex: 0,
    currentStep: 0
};

// ============================================================
// UTILITY FUNCTIONS (Giữ nguyên từ bản React)
// ============================================================
const cleanText = (text) => text ? text.trim() : '';
const capitalizeFirstLetter = (string) => !string ? '' : string.charAt(0).toUpperCase() + string.slice(1);

// ============================================================
// SRS ALGORITHM (Giữ nguyên)
// ============================================================
function getDefaultSrsData() {
    return { status: 0, srsStep: 0, nextReview: 0, failCount: 0, lastInteracted: 0, isHard: false };
}

function getCardState(data) {
    const status = data?.status ?? 0;
    const failCount = data?.failCount ?? 0;
    const srsStep = data?.srsStep ?? 0;
    const isHard = data?.isHard ?? false;

    if (status === 2) return 'mastered';
    if (isHard) return 'practicing';
    if (status === 0 && failCount === 0) return 'untouched';
    if ((status === 0 && failCount > 0) || (status === 1 && srsStep <= 1)) return 'learning';
    if (status === 1 && srsStep > 1) return 'practicing';
    return 'learning';
}

function isCardOverdue(data, now = Date.now()) {
    return data?.nextReview > 0 && data?.nextReview <= now && !data?.isHard;
}

function computeOverdueLoad(srsData, now = Date.now()) {
    if (!srsData || typeof srsData !== 'object') return 0;
    return Object.values(srsData).filter((item) => item.nextReview <= now && !item.isHard).length;
}

function computeStabilityIndex(srsData) {
    if (!srsData || typeof srsData !== 'object') return 0;
    const vals = Object.values(srsData);
    if (vals.length === 0) return 0;
    const step4Plus = vals.filter((item) => (item.srsStep || 0) >= 4).length;
    return (step4Plus / vals.length) * 100;
}

function getStudyTargets(ar, ol) {
    const safeAR = (typeof ar === 'number' && !isNaN(ar)) ? ar : 80;
    let newWords = DAILY_NEW_TARGET;
    let state = 'STABLE';
    if (safeAR < 70 || ol > 200) state = 'DANGER';
    else if (safeAR >= 85) state = 'EXCELLENT';
    return { state, newWords, reviewWords: POMODORO_REVIEW_TARGET };
}

// ============================================================
// PARSING (Giữ nguyên)
// ============================================================
const parseCSV = (text) => {
    const lines = text.split('\n');
    const data = [];
    for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        if (parts.length >= 5) {
            data.push({
                id: `word-${i}`,
                familyId: cleanText(parts[0]) || 'unknown',
                pos: cleanText(parts[1]),
                word: cleanText(parts[2]).replace(/^"|"$/g, ''),
                synonyms: cleanText(parts[3]).replace(/^"|"$/g, ''),
                meaningVN: cleanText(parts[4]).replace(/^"|"$/g, ''),
            });
        }
    }
    return data;
};

// ============================================================
// LEVENSHTEIN DISTANCE (Giữ nguyên)
// ============================================================
function getEditDistance(a, b) {
    if (a.length === 0) return b.length;
    if (b.length === 0) return a.length;
    const matrix = [];
    for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
    for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
    for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
            if (b.charAt(i - 1) === a.charAt(j - 1)) {
                matrix[i][j] = matrix[i - 1][j - 1];
            } else {
                matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
            }
        }
    }
    return matrix[b.length][a.length];
}

function getTextSimilarity(a, b) {
    const maxLength = Math.max(a.length, b.length);
    if (maxLength === 0) return 1;
    return (maxLength - getEditDistance(a, b)) / maxLength;
}

// ============================================================
// TEXT-TO-SPEECH (Giữ nguyên logic)
// ============================================================
let voices = [];
let selectedVoiceURI = '';

function initVoices() {
    voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
    const preferred = voices.find(v => v.name.includes('Google') || v.name.includes('Microsoft'));
    if (preferred) selectedVoiceURI = preferred.voiceURI;
    if (!selectedVoiceURI && voices.length > 0) selectedVoiceURI = voices[0].voiceURI;
}

if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = initVoices;
}
initVoices();

function speak(text, rate = 1) {
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = rate;
    const voice = voices.find(v => v.voiceURI === selectedVoiceURI);
    if (voice) utterance.voice = voice;
    speechSynthesis.speak(utterance);
}

function stopSpeaking() {
    speechSynthesis.cancel();
}

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(screenId) {
    ['initial-screen', 'dashboard-screen', 'study-screen', 'complete-screen'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
    });
    document.getElementById(screenId).classList.remove('hidden');
}

// ============================================================
// FILE HANDLERS
// ============================================================
function handleCSVUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (e) => {
        const newWords = parseCSV(e.target.result);
        if (newWords.length === 0) {
            alert('Không tìm thấy từ nào trong file. Kiểm tra định dạng CSV.');
            return;
        }
        
        // Merge with existing words
        const existingIds = new Set(state.words.map(w => w.id));
        newWords.forEach(w => {
            if (!existingIds.has(w.id)) {
                state.words.push(w);
                state.srsData[w.id] = getDefaultSrsData();
            }
        });
        
        saveToStorage();
        updateDashboard();
        showScreen('dashboard-screen');
    };
    reader.readAsText(file);
}

function handleRestore(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            if (data.words) state.words = data.words;
            if (data.srsData) state.srsData = data.srsData;
            saveToStorage();
            updateDashboard();
            showScreen('dashboard-screen');
        } catch (err) {
            alert('File không hợp lệ: ' + err.message);
        }
    };
    reader.readAsText(file);
}

function exportProgress() {
    const data = {
        words: state.words,
        srsData: state.srsData,
        exportedAt: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `alm-progress-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

// ============================================================
// STORAGE
// ============================================================
function saveToStorage() {
    localStorage.setItem('alm-words', JSON.stringify(state.words));
    localStorage.setItem('alm-srs', JSON.stringify(state.srsData));
}

function loadFromStorage() {
    const words = localStorage.getItem('alm-words');
    const srs = localStorage.getItem('alm-srs');
    if (words) state.words = JSON.parse(words);
    if (srs) state.srsData = JSON.parse(srs);
}

// ============================================================
// DASHBOARD
// ============================================================
function updateDashboard() {
    const total = state.words.length;
    const overdue = computeOverdueLoad(state.srsData);
    const mastered = Object.values(state.srsData).filter(d => d.status === 2).length;
    
    document.getElementById('total-words').textContent = total;
    document.getElementById('due-count').textContent = overdue;
    document.getElementById('mastered-count').textContent = mastered;
}

function startNewSession() {
    showScreen('dashboard-screen');
}

function startStudySession(type = 'all') {
    const now = Date.now();
    
    // Build study queue based on type
    let queue = [];
    
    if (type === 'new') {
        queue = state.words.filter(w => {
            const data = state.srsData[w.id] || getDefaultSrsData();
            return data.status === 0 && data.failCount === 0;
        }).slice(0, DAILY_NEW_TARGET);
    } else if (type === 'review') {
        queue = state.words.filter(w => {
            const data = state.srsData[w.id] || getDefaultSrsData();
            return isCardOverdue(data, now);
        }).slice(0, POMODORO_REVIEW_TARGET);
    } else {
        queue = [...state.words];
    }
    
    if (queue.length === 0) {
        alert('Không có từ nào cần học!');
        return;
    }
    
    state.studyQueue = queue;
    state.currentIndex = 0;
    state.currentStep = 0;
    
    showScreen('study-screen');
    renderCurrentStep();
}

function closeStudy() {
    stopSpeaking();
    showScreen('dashboard-screen');
}

function backToDashboard() {
    showScreen('dashboard-screen');
    updateDashboard();
}

// ============================================================
// STUDY STEPS
// ============================================================
function renderCurrentStep() {
    if (state.currentIndex >= state.studyQueue.length) {
        showScreen('complete-screen');
        return;
    }
    
    const word = state.studyQueue[state.currentIndex];
    const progress = ((state.currentIndex + 1) / state.studyQueue.length) * 100;
    document.getElementById('study-progress').style.width = progress + '%';
    
    const debt = computeOverdueLoad(state.srsData);
    document.getElementById('study-debt').textContent = debt;
    
    const container = document.getElementById('step-container');
    
    if (state.currentStep === 0) {
        renderSpellingStep(word, container);
    } else if (state.currentStep === 1) {
        renderMeaningStep(word, container);
    } else {
        // All steps complete, commit and move on
        commitCard(true);
    }
}

function renderSpellingStep(word, container) {
    container.innerHTML = `
        <div class="animate-fade-in">
            <div class="text-center mb-4">
                <span class="step-indicator">B.1: Nghe & Chép</span>
            </div>
            
            <div class="word-display">
                <button onclick="playSpelling('${word.word}')" class="btn btn-secondary mb-4">🔊 Nghe</button>
                <div class="pos-tag">${word.pos || 'word'}</div>
            </div>
            
            <div class="mb-4" style="text-align: center;">
                <p style="color: var(--text-secondary); font-size: 14px;">Gợi ý: ${word.meaningVN.substring(0, 50)}...</p>
            </div>
            
            <input type="text" id="spelling-input" class="answer-input" 
                   placeholder="Nhập từ bạn nghe được..." 
                   onkeydown="if(event.key==='Enter')checkSpelling('${word.word}')">
            
            <div class="btn-group">
                <button onclick="checkSpelling('${word.word}')" class="btn btn-primary">Kiểm tra</button>
                <button onclick="showAnswer()" class="btn btn-secondary">Hiện đáp án</button>
            </div>
            
            <div id="feedback" class="hidden mt-4 text-center"></div>
        </div>
    `;
    
    document.getElementById('spelling-input').focus();
    
    // Auto play on load
    setTimeout(() => playSpelling(word.word), 500);
}

function playSpelling(word) {
    speak(word, 0.8);
}

function checkSpelling(correctWord) {
    const input = document.getElementById('spelling-input');
    const userAnswer = input.value.trim().toLowerCase();
    const correct = correctWord.toLowerCase();
    
    const similarity = getTextSimilarity(userAnswer, correct);
    
    if (similarity >= 0.85 || userAnswer === correct) {
        input.classList.remove('error');
        input.classList.add('correct');
        document.getElementById('feedback').innerHTML = '<span style="color: var(--success); font-size: 24px;">✅ Chính xác!</span>';
        document.getElementById('feedback').classList.remove('hidden');
        
        setTimeout(() => {
            state.currentStep = 1;
            renderCurrentStep();
        }, 1000);
    } else {
        input.classList.add('error');
        input.classList.add('animate-shake');
        document.getElementById('feedback').innerHTML = `<span style="color: var(--error);">❌ Chưa đúng. Độ chính xác: ${Math.round(similarity * 100)}%</span>`;
        document.getElementById('feedback').classList.remove('hidden');
        
        setTimeout(() => {
            input.classList.remove('animate-shake');
        }, 300);
    }
}

function showAnswer() {
    const word = state.studyQueue[state.currentIndex];
    const input = document.getElementById('spelling-input');
    input.value = word.word;
    input.disabled = true;
    document.getElementById('feedback').innerHTML = `<span style="color: var(--warning);">Đáp án: <b>${word.word}</b></span>`;
    document.getElementById('feedback').classList.remove('hidden');
    
    setTimeout(() => {
        state.currentStep = 1;
        renderCurrentStep();
    }, 2000);
}

function renderMeaningStep(word, container) {
    container.innerHTML = `
        <div class="animate-fade-in">
            <div class="text-center mb-4">
                <span class="step-indicator">B.2: Chọn nghĩa VN</span>
            </div>
            
            <div class="word-display">
                <div class="word-text">${word.word}</div>
                <div class="pos-tag">${word.pos || 'word'}</div>
            </div>
            
            <div class="mb-4">
                <button onclick="speak('${word.word}')" class="btn btn-secondary w-full">🔊 Phát âm</button>
            </div>
            
            <div class="mb-4" style="padding: 16px; background: var(--accent-light); border-radius: 12px;">
                <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">Từ loại: <b>${word.pos || 'unknown'}</b></p>
                <p style="font-size: 14px;">Synonyms: ${word.synonyms || 'không có'}</p>
            </div>
            
            <input type="text" id="meaning-input" class="answer-input" 
                   placeholder="Nhập nghĩa tiếng Việt..." 
                   onkeydown="if(event.key==='Enter')checkMeaning()">
            
            <div class="btn-group">
                <button onclick="checkMeaning()" class="btn btn-primary">Kiểm tra</button>
                <button onclick="showMeaningAnswer()" class="btn btn-secondary">Hiện đáp án</button>
            </div>
            
            <div id="meaning-feedback" class="hidden mt-4 text-center"></div>
        </div>
    `;
    
    document.getElementById('meaning-input').focus();
}

function checkMeaning() {
    const input = document.getElementById('meaning-input');
    const userAnswer = input.value.trim().toLowerCase();
    const word = state.studyQueue[state.currentIndex];
    const correct = word.meaningVN.toLowerCase();
    
    const similarity = getTextSimilarity(userAnswer, correct);
    
    if (similarity >= 0.6 || correct.includes(userAnswer) || userAnswer.includes(correct.split('/')[0])) {
        input.classList.add('correct');
        document.getElementById('meaning-feedback').innerHTML = '<span style="color: var(--success); font-size: 24px;">✅ Chính xác!</span>';
        document.getElementById('meaning-feedback').classList.remove('hidden');
        
        setTimeout(() => commitCard(true), 1000);
    } else {
        input.classList.add('error');
        input.classList.add('animate-shake');
        document.getElementById('meaning-feedback').innerHTML = `<span style="color: var(--error);">❌ Chưa đúng rồi. Thử lại!</span>`;
        document.getElementById('meaning-feedback').classList.remove('hidden');
        
        setTimeout(() => {
            input.classList.remove('animate-shake');
            input.value = '';
            input.focus();
        }, 500);
    }
}

function showMeaningAnswer() {
    const word = state.studyQueue[state.currentIndex];
    const input = document.getElementById('meaning-input');
    input.value = word.meaningVN;
    input.disabled = true;
    document.getElementById('meaning-feedback').innerHTML = `<span style="color: var(--warning);">Đáp án: <b>${word.meaningVN}</b></span>`;
    document.getElementById('meaning-feedback').classList.remove('hidden');
    
    setTimeout(() => commitCard(false), 2000);
}

function commitCard(isSuccess) {
    const word = state.studyQueue[state.currentIndex];
    const now = Date.now();
    
    // Update SRS data
    const cardData = state.srsData[word.id] || getDefaultSrsData();
    let nextStep = cardData.srsStep;
    let nextStatus = cardData.status;
    
    if (isSuccess) {
        nextStep = Math.min(SRS_INTERVALS.length - 1, nextStep + 2);
        if (nextStep >= 4) nextStatus = 1;
        if (nextStep >= SRS_INTERVALS.length - 1) nextStatus = 2;
    } else {
        nextStep = Math.max(0, nextStep - 1);
        cardData.failCount = (cardData.failCount || 0) + 1;
        if (cardData.failCount >= 3) cardData.isHard = true;
    }
    
    state.srsData[word.id] = {
        ...cardData,
        status: nextStatus,
        srsStep: nextStep,
        nextReview: now + SRS_INTERVALS[nextStep],
        lastInteracted: now
    };
    
    saveToStorage();
    
    // Move to next card
    state.currentIndex++;
    state.currentStep = 0;
    renderCurrentStep();
}

// ============================================================
// DARK MODE
// ============================================================
function toggleDarkMode() {
    state.darkMode = !state.darkMode;
    document.body.classList.toggle('dark', state.darkMode);
    localStorage.setItem('alm-darkmode', state.darkMode);
}

function loadDarkMode() {
    const saved = localStorage.getItem('alm-darkmode');
    if (saved === 'true') {
        state.darkMode = true;
        document.body.classList.add('dark');
    }
}

// ============================================================
// INITIALIZATION
// ============================================================
function init() {
    loadFromStorage();
    loadDarkMode();
    
    if (state.words.length > 0) {
        showScreen('dashboard-screen');
        updateDashboard();
    } else {
        showScreen('initial-screen');
    }
}

// Start app
init();
</script>
</body>
</html>
