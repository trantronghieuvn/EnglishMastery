<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Mastery - ALM Engine v2.5</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
    </script>
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

    <style>
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;

        .animate-pop {
            animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;

        .custom-scroll::-webkit-scrollbar {

<body
    class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 selection:bg-indigo-200 dark:selection:bg-indigo-800 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const safeStorage = {
            getItem: (key) => { try { return localStorage.getItem(key); } catch (e) { return null; } },
            setItem: (key, value) => { try { localStorage.setItem(key, value); } catch (e) { } },
            removeItem: (key) => { try { localStorage.removeItem(key); } catch (e) { } }
        };

        const IconBase = ({ children, size = 20, className = "", ...props }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>);
        const Mic = (p) => <IconBase {...p}><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2" /><line x1="12" y1="19" x2="12" y2="23" /><line x1="8" y1="23" x2="16" y2="23" /></IconBase>;
        const MicOff = (p) => <IconBase {...p}><line x1="1" y1="1" x2="23" y2="23" /><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6" /><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23" /><line x1="12" y1="19" x2="12" y2="23" /><line x1="8" y1="23" x2="16" y2="23" /></IconBase>;
        const Volume2 = (p) => <IconBase {...p}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" /></IconBase>;
        const Volume1 = (p) => <IconBase {...p}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /></IconBase>;
        const Upload = (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></IconBase>;
        const CheckCircle = (p) => <IconBase {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></IconBase>;
        const XCircle = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10" /><line x1="15" y1="9" x2="9" y2="15" /><line x1="9" y1="9" x2="15" y2="15" /></IconBase>;
        const Play = (p) => <IconBase {...p}><polygon points="5 3 19 12 5 21 5 3" /></IconBase>;
        const BookOpen = (p) => <IconBase {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></IconBase>;
        const Activity = (p) => <IconBase {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></IconBase>;
        const Sun = (p) => <IconBase {...p}><circle cx="12" cy="12" r="4" /><path d="M12 2v2" /><path d="M12 20v2" /><path d="m4.93 4.93 1.41 1.41" /><path d="m17.66 17.66 1.41 1.41" /><path d="M2 12h2" /><path d="M20 12h2" /><path d="m6.34 17.66-1.41 1.41" /><path d="m19.07 4.93-1.41 1.41" /></IconBase>;
        const Moon = (p) => <IconBase {...p}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" /></IconBase>;
        const Key = (p) => <IconBase {...p}><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4" /><path d="m21 2-9.6 9.6" /><circle cx="7.5" cy="15.5" r="5.5" /></IconBase>;
        const Ear = (p) => <IconBase {...p}><path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 10a3.5 3.5 0 1 1-7 0" /><path d="M15 8.5a2.5 2.5 0 0 0-5 0v1a2 2 0 1 0 4 0v-4v4a2 2 0 0 0 4 0v-1a2.5 2.5 0 0 0-5 0v.5" /></IconBase>;
        const Brain = (p) => <IconBase {...p}><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z" /><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z" /></IconBase>;
        const Target = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></IconBase>;
        const Clock = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></IconBase>;
        const Coffee = (p) => <IconBase {...p}><path d="M17 8h1a4 4 0 1 1 0 8h-1" /><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z" /><line x1="9" y1="2" x2="9" y2="4" /><line x1="15" y1="2" x2="15" y2="4" /></IconBase>;
        const AlertOctagon = (p) => <IconBase {...p}><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></IconBase>;
        const ToggleLeft = (p) => <IconBase {...p}><rect x="1" y="5" width="22" height="14" rx="7" ry="7" /><circle cx="8" cy="12" r="3" /></IconBase>;
        const ToggleRight = (p) => <IconBase {...p}><rect x="1" y="5" width="22" height="14" rx="7" ry="7" /><circle cx="16" cy="12" r="3" /></IconBase>;
        const Save = (p) => <IconBase {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></IconBase>;
        const Download = (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></IconBase>;
        const FileJson = (p) => <IconBase {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /></IconBase>;

        const SRS_INTERVALS = [0, 10 * 60 * 1000, 24 * 60 * 60 * 1000, 3 * 24 * 60 * 60 * 1000, 7 * 24 * 60 * 60 * 1000];
        const INITIAL_PROGRESS = { srsData: {}, currentSessionId: null, stats: { totalTimeStudied: 0, cardsReviewed: 0 } };
        const IS_POMODORO_TEST_MODE = new URLSearchParams(window.location.search).get('breakTest') === '1';
        const POMODORO_DURATION_MS = IS_POMODORO_TEST_MODE ? 30 * 1000 : 25 * 60 * 1000;
        const POMODORO_LIMIT_CARDS = 50;
        const MAX_VOICE_ATTEMPTS = 3;
        const DAILY_NEW_TARGET = 20;
        const POMODORO_NEW_BATCH_SIZE = 5;
        const POMODORO_REVIEW_TARGET = 36;
        const POMODORO_HARD_TARGET = 4;
        const REVIEW_OVERLOAD_SOFT_CAP = 50;
        const ROOT_REFLEX_TIME_LIMIT_MS = 5000;

        const formatPomodoroTime = (ms) => {
            const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        };

        function computeOverdueLoad(srsData, now = Date.now()) {
            if (!srsData || typeof srsData !== 'object') return 0;
            return Object.values(srsData).filter((item) => item.nextReview <= now && !item.isHard).length;
        }

        function computeStabilityIndex(srsData) {
            if (!srsData || typeof srsData !== 'object') return 0;
            const vals = Object.values(srsData);
            if (vals.length === 0) return 0;
            const step4Plus = vals.filter((item) => (item.srsStep || 0) >= 4).length;
            return (step4Plus / vals.length) * 100;
        }

        function getStudyTargets(ar, ol) {
            const safeAR = (typeof ar === 'number' && !isNaN(ar)) ? ar : 80;
            let newWords = DAILY_NEW_TARGET;

            let state = 'STABLE';
            if (safeAR < 70 || ol > 200) state = 'DANGER';
            else if (safeAR >= 85) state = 'EXCELLENT';

            return { state, newWords, reviewWords: POMODORO_REVIEW_TARGET };
        }

        // ============================================================
        // STATE MACHINE: 4 Independent States for ALM Engine v2.5
        // ============================================================
        // State 1 - Untouched: status===0 AND (failCount===0 OR no failCount)
        // State 2 - Learning: (status===0 AND failCount>0) OR (status===1 AND srsStep<=1 AND !isHard)
        // State 3 - Practicing: (status===1 AND srsStep>1) OR isHard===true
        // State 4 - Mastered: status===2
        function getCardState(data) {
            const status = data?.status ?? 0;
            const failCount = data?.failCount ?? 0;
            const srsStep = data?.srsStep ?? 0;
            const isHard = data?.isHard ?? false;

            // State 4: Mastered (highest priority, cannot be overridden)
            if (status === 2) return 'mastered';

            // State 3: Practicing - isHard overrides everything except mastered
            if (isHard) return 'practicing';

            // State 1: Untouched (never interacted, no failures)
            if (status === 0 && failCount === 0) return 'untouched';

            // State 2: Learning (interacted but failed OR early learning stage)
            if ((status === 0 && failCount > 0) || (status === 1 && srsStep <= 1)) return 'learning';

            // State 3: Practicing (advanced learning, srsStep > 1)
            if (status === 1 && srsStep > 1) return 'practicing';

            // Fallback for edge cases: treat as learning
            return 'learning';
        }

        // Helper to get default SRS data structure
        function getDefaultSrsData() {
            return { status: 0, srsStep: 0, nextReview: 0, failCount: 0, lastInteracted: 0, isHard: false };
        }

        // Helper to check if card is overdue for review
        function isCardOverdue(data, now = Date.now()) {
            return data?.nextReview > 0 && data?.nextReview <= now && !data?.isHard;
        }

        const cleanText = (text) => text ? text.trim() : '';
        const capitalizeFirstLetter = (string) => !string ? '' : string.charAt(0).toUpperCase() + string.slice(1);

        const parseCSV = (text) => {
            const lines = text.split('\n');
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (parts.length >= 5) {
                    data.push({
                        id: `${parts[0]}-${i}`,
                        familyId: cleanText(parts[0]) || 'unknown',
                        pos: cleanText(parts[1]),
                        word: cleanText(parts[2]).replace(/^"|"$/g, ''),
                        synonyms: cleanText(parts[3]).replace(/^"|"$/g, ''),
                        meaningVN: cleanText(parts[4]).replace(/^"|"$/g, ''),
                    });
                }
            }
            return data;
        };

        const upgradeWordsData = (wordsArray) => {
            if (!Array.isArray(wordsArray)) return [];
            return wordsArray.map(w => {
                if (w.id && !w.familyId) w.familyId = w.id.split('-')[0] || 'unknown';
                return w;
            });
        };

        const upgradeProgressToALM = (p, words, restoreRatio = 2.5) => {
            if (!p) return INITIAL_PROGRESS;
            if (p.srsData) return p;
            const newSrsData = {};
            const now = Date.now();
            let safeMastered = p.masteredWords || [];

            if (p.wordIndex > 0 && safeMastered.length >= p.wordIndex - 1) {
                const totalScores = (p.scores?.spelling || 0) + (p.scores?.pronunciation || 0) + (p.scores?.meaning || 0);
                let estimatedMastered = Math.floor(totalScores / restoreRatio);
                estimatedMastered = Math.min(Math.max(0, estimatedMastered), safeMastered.length);
                safeMastered = safeMastered.slice(0, estimatedMastered);
            }

            const maxIndex = Math.max(p.maxWordIndex || 0, p.wordIndex || 0);
            words.forEach((w, index) => {
                if (safeMastered.includes(w.id)) {
                    newSrsData[w.id] = { status: 2, srsStep: SRS_INTERVALS.length - 1, nextReview: now + SRS_INTERVALS[SRS_INTERVALS.length - 1], failCount: 0, lastInteracted: now - 86400000, isHard: false };
                } else if (index <= maxIndex) {
                    newSrsData[w.id] = { status: 1, srsStep: 1, nextReview: now, failCount: 1, lastInteracted: now, isHard: false };
                } else {
                    newSrsData[w.id] = { status: 0, srsStep: 0, nextReview: 0, failCount: 0, lastInteracted: 0, isHard: false };
                }
            });
            return { ...INITIAL_PROGRESS, srsData: newSrsData, currentSessionId: words[Math.min(p.wordIndex || 0, words.length - 1)]?.id || null };
        };

        const normalizeSpeech = (text) => {
            if (!text) return "";
            let t = text.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "").replace(/\s{2,}/g, " ").trim();
            const numMap = { '0': 'zero', '1': 'one', '2': 'two', '3': 'three', '4': 'four', '5': 'five', '6': 'six', '7': 'seven', '8': 'eight', '9': 'nine', '10': 'ten' };
            t = t.split(/\s+/).map(w => numMap[w] || w).join(' ');
            return t.trim();
        };

        const getEditDistance = (a, b) => {
            if (a.length === 0) return b.length;
            if (b.length === 0) return a.length;
            const matrix = [];
            for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
            for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
                    }
                }
            }
            return matrix[b.length][a.length];
        };

        const getTextSimilarity = (a, b) => {
            const maxLength = Math.max(a.length, b.length);
            if (maxLength === 0) return 1;
            return (maxLength - getEditDistance(a, b)) / maxLength;
        };

        const splitSpeechWords = (text) => normalizeSpeech(text).split(/\s+/).filter(Boolean);

        const hasExactSpeechPhrase = (spoken, target) => {
            const cleanSpoken = normalizeSpeech(spoken);
            const cleanTarget = normalizeSpeech(target);
            if (!cleanTarget) return false;
            const phrasePattern = new RegExp(`(^|\\s)${cleanTarget.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}(\\s|$)`);
            return phrasePattern.test(cleanSpoken);
        };

        const hasImportantWordCoverage = (spoken, target, wordThreshold = 0.78) => {
            const spokenWords = splitSpeechWords(spoken);
            const targetWords = splitSpeechWords(target).filter((w) => w.length > 2);
            if (targetWords.length <= 1) return false;
            return targetWords.every((targetWord) =>
                spokenWords.some((spokenWord) => spokenWord === targetWord || getTextSimilarity(spokenWord, targetWord) >= wordThreshold)
            );
        };

        const formatTextForSpeech = (text) => text ? text.replace(/[,/|]+/g, ', ') : "";

        const getAmBoi = (ipa) => {
            if (!ipa) return "";
            let s = ipa.replace(/[\/ˈˌ()]/g, '').toLowerCase();
            s = s.replace(/tʃ/g, 'ch').replace(/dʒ/g, 'gi').replace(/θ/g, 'th').replace(/ð/g, 'đ')
                .replace(/ʃ/g, 'sh').replace(/ʒ/g, 'gi').replace(/ŋ/g, 'ng').replace(/eɪ/g, 'ây')
                .replace(/aɪ/g, 'ai').replace(/ɔɪ/g, 'oi').replace(/əʊ|oʊ/g, 'âu').replace(/aʊ/g, 'au')
                .replace(/ɪə/g, 'ia').replace(/eə/g, 'e').replace(/ʊə/g, 'ua').replace(/i:|ɪ|i/g, 'i')
                .replace(/e|ɛ/g, 'e').replace(/æ|ɑ:|a:|a/g, 'a').replace(/ʌ/g, 'ă').replace(/ɒ|ɔ:|ɔ/g, 'o')
                .replace(/ʊ|u:|u/g, 'u').replace(/ə|ɜ:|ɝ|ɚ/g, 'ơ').replace(/d/g, 'đ').replace(/k/g, 'c')
                .replace(/j/g, 'gi').replace(/ɹ|r/g, 'r').replace(/w/g, 'u').replace(/\./g, '-');
            return s;
        };

        const guessIPA = (word) => {
            if (!word) return "";
            let w = word.toLowerCase();
            w = w.replace(/tion/g, 'ʃən').replace(/sion/g, 'ʒən').replace(/ture/g, 'tʃə').replace(/ous/g, 'əs').replace(/ight/g, 'aɪt').replace(/ally/g, 'əli').replace(/ly/g, 'li').replace(/ing/g, 'ɪŋ').replace(/ed\b/g, 'd');
            w = w.replace(/ph/g, 'f').replace(/sh/g, 'ʃ').replace(/ch/g, 'tʃ').replace(/th/g, 'θ').replace(/wh/g, 'w').replace(/ck/g, 'k').replace(/kn/g, 'n').replace(/wr/g, 'r');
            w = w.replace(/ee/g, 'i:').replace(/ea/g, 'i:').replace(/oo/g, 'u:').replace(/oa/g, 'əʊ').replace(/ou/g, 'aʊ').replace(/ow/g, 'aʊ').replace(/ay/g, 'eɪ').replace(/ai/g, 'eɪ');
            w = w.replace(/a([bcdfgklmnprstvxz])e\b/g, 'eɪ$1').replace(/i([bcdfgklmnprstvxz])e\b/g, 'aɪ$1').replace(/o([bcdfgklmnprstvxz])e\b/g, 'əʊ$1').replace(/u([bcdfgklmnprstvxz])e\b/g, 'ju:$1');
            w = w.replace(/ce/g, 'se').replace(/ci/g, 'sɪ').replace(/cy/g, 'sɪ').replace(/ge/g, 'dʒe').replace(/gi/g, 'dʒɪ').replace(/gy/g, 'dʒɪ');
            w = w.replace(/([bcdfghjklmnpqrstvwxyz])\1/g, '$1');
            w = w.replace(/a/g, 'æ').replace(/e/g, 'e').replace(/i/g, 'ɪ').replace(/o/g, 'ɒ').replace(/u/g, 'ʌ').replace(/y\b/g, 'ɪ');
            w = w.replace(/c/g, 'k').replace(/q/g, 'k').replace(/x/g, 'ks').replace(/j/g, 'dʒ');
            return `/${w}/`;
        };

        const fetchIPA = async (text) => {
            if (!text) return null;
            const words = text.trim().split(/\s+/);
            const getWordIPA = async (w) => {
                const cleanW = w.replace(/[^a-zA-Z-]/g, '');
                if (!cleanW) return "";
                try {
                    const res = await Promise.race([
                        fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${cleanW}`),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 2500))
                    ]);
                    if (!res.ok) return guessIPA(cleanW).replace(/\//g, '');
                    const data = await res.json();
                    if (Array.isArray(data) && data[0]) {
                        const dictIpa = data[0].phonetic || (data[0].phonetics && data[0].phonetics.find((p) => p.text && p.text.length > 0)?.text) || null;
                        if (dictIpa) return dictIpa.replace(/\//g, '');
                    }
                    return guessIPA(cleanW).replace(/\//g, '');
                } catch {
                    return guessIPA(cleanW).replace(/\//g, '');
                }
            };
            const ipas = await Promise.all(words.map(w => getWordIPA(w)));
            const validIpas = ipas.filter(Boolean);
            return validIpas.length > 0 ? `/${validIpas.join(' ')}/` : null;
        };

        function useCloudRecorder(sttConfig, lang, targetText, onResult, onError, onPartialResult) {
            const [isRecording, setIsRecording] = useState(false);
            const mediaRecorderRef = useRef(null);
            const audioChunksRef = useRef([]);
            const audioContextRef = useRef(null);
            const vadIntervalRef = useRef(null);
            const streamRef = useRef(null);
            const browserRecRef = useRef(null);

            useEffect(() => {
                return () => {
                    clearInterval(vadIntervalRef.current);
                    if (audioContextRef.current && audioContextRef.current.state !== 'closed') audioContextRef.current.close().catch(() => { });
                    if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                        mediaRecorderRef.current.onstop = null;
                        mediaRecorderRef.current.stop();
                    }
                    if (streamRef.current) streamRef.current.getTracks().forEach(track => track.stop());
                    if (browserRecRef.current) try { browserRecRef.current.stop(); } catch (e) { }
                };
            }, []);

            const processTranscriptData = (data) => {
                let text = data.text || '';
                const lower = text.toLowerCase();
                if (lower.includes('subscribe') || lower.includes('ghiền mì gõ') || lower.includes('cảm ơn các bạn') || lower.includes('hẹn gặp lại') || lower.includes('subtitles by')) return '';
                if (data.words && Array.isArray(data.words) && data.words.length > 0) {
                    const wordsWithProb = data.words.filter(w => typeof w.probability === 'number');
                    if (wordsWithProb.length > 0) {
                        const avgProb = wordsWithProb.reduce((s, w) => s + w.probability, 0) / wordsWithProb.length;
                        const minProb = Math.min(...wordsWithProb.map(w => w.probability));
                        if (avgProb < 0.7 || minProb < 0.4) text = `[ÉP CHỮ - Avg: ${(avgProb * 100).toFixed(0)}%, Min: ${(minProb * 100).toFixed(0)}%] ${text}`;
                    }
                }
                return text;
            };

            const startRecording = async () => {
                const { engine, openaiKey, googleKey, localWhisperUrl, groqKey, fptKey, viettelKey } = sttConfig;

                if (engine === 'browser') {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (!SpeechRecognition) return onError("Trình duyệt không hỗ trợ Web Speech API.");
                    if (browserRecRef.current) try { browserRecRef.current.stop(); } catch (e) { }

                    const rec = new SpeechRecognition();
                    rec.continuous = false;
                    rec.interimResults = true;
                    rec.lang = lang;

                    rec.onstart = () => { setIsRecording(true); };
                    rec.onend = () => { setIsRecording(false); };

                    rec.onresult = (event) => {
                        let text = '';
                        let isFinal = false;
                        for (let i = event.resultIndex; i < event.results.length; ++i) {
                            if (event.results[i] && event.results[i][0]) {
                                text += event.results[i][0].transcript;
                                if (event.results[i].isFinal) isFinal = true;
                            }
                        }
                        if (onPartialResult) onPartialResult(text);
                        if (isFinal) {
                            try { rec.stop(); } catch (e) { }
                            setIsRecording(false);
                            onResult(text.trim());
                        }
                    };

                    rec.onerror = (e) => {
                        setIsRecording(false);
                        if (e.error !== 'no-speech' && e.error !== 'aborted') {
                            onError(e.error === 'network' ? 'Lỗi mạng (Trình duyệt).' : `Lỗi Mic: ${e.error}`);
                        }
                    };

                    browserRecRef.current = rec;
                    try { rec.start(); } catch (e) { setIsRecording(false); }
                    return;
                }

                if (engine === 'whisper' && !openaiKey) return onError("Vui lòng nhập OpenAI API Key ở Cài đặt API.");
                if (engine === 'google' && !googleKey) return onError("Vui lòng nhập Google Cloud API Key ở Cài đặt API.");
                if (engine === 'groq' && !groqKey) return onError("Vui lòng nhập Groq API Key ở Cài đặt API.");
                if (engine === 'local_whisper' && !localWhisperUrl) return onError("Vui lòng nhập URL Local Whisper ở Cài đặt API.");
                if (engine === 'fpt' && !fptKey) return onError("Vui lòng nhập FPT API Key ở Cài đặt API.");
                if (engine === 'viettel' && !viettelKey) return onError("Vui lòng nhập Viettel API Key ở Cài đặt API.");

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                    });
                    streamRef.current = stream;
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    audioChunksRef.current = [];
                    setIsRecording(true);

                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    audioContextRef.current = audioContext;
                    const analyser = audioContext.createAnalyser();
                    const microphone = audioContext.createMediaStreamSource(stream);
                    microphone.connect(analyser);

                    analyser.fftSize = 1024;
                    const bufferLength = analyser.fftSize;
                    const dataArray = new Uint8Array(bufferLength);

                    let lastSpeakingTime = Date.now();
                    let hasSpoken = false;

                    vadIntervalRef.current = setInterval(() => {
                        if (mediaRecorder.state !== 'recording') return;
                        analyser.getByteTimeDomainData(dataArray);

                        let sum = 0;
                        for (let i = 0; i < bufferLength; i++) {
                            const v = dataArray[i] - 128;
                            sum += v * v;
                        }
                        const rms = Math.sqrt(sum / bufferLength);

                        if (rms > 6.0) {
                            lastSpeakingTime = Date.now();
                            hasSpoken = true;
                        } else if (hasSpoken && (Date.now() - lastSpeakingTime > 2500)) {
                            if (mediaRecorder.state === 'recording') mediaRecorder.stop();
                            hasSpoken = false;
                        } else if (!hasSpoken && (Date.now() - lastSpeakingTime > 6000)) {
                            if (mediaRecorder.state === 'recording') mediaRecorder.stop();
                        }
                    }, 100);

                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) audioChunksRef.current.push(e.data);
                    };

                    mediaRecorder.onstop = async () => {
                        setIsRecording(false);
                        clearInterval(vadIntervalRef.current);
                        if (audioContextRef.current && audioContextRef.current.state !== 'closed') audioContextRef.current.close().catch(() => { });
                        stream.getTracks().forEach(track => track.stop());

                        const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });

                        const promptContext = lang === 'vi-VN'
                            ? `Vui lòng phiên âm chính xác đoạn tiếng Việt sau: "${targetText || ''}". Không giải thích thêm.`
                            : `The expected phrase is: "${targetText || ''}". Transcribe exactly.`;

                        try {
                            if (engine === 'whisper') {
                                const formData = new FormData();
                                formData.append('file', audioBlob, 'audio.webm');
                                formData.append('model', 'whisper-1');
                                formData.append('language', lang === 'vi-VN' ? 'vi' : 'en');
                                formData.append('temperature', '0');
                                if (promptContext) formData.append('prompt', promptContext);
                                formData.append('response_format', 'verbose_json');
                                formData.append('timestamp_granularities[]', 'word');

                                const res = await fetch('https://api.openai.com/v1/audio/transcriptions', { method: 'POST', headers: { 'Authorization': `Bearer ${openaiKey}` }, body: formData });
                                if (!res.ok) throw new Error(`Lỗi OpenAI (HTTP ${res.status})`);
                                const data = await res.json();
                                onResult(processTranscriptData(data).trim());

                            } else if (engine === 'groq') {
                                const formData = new FormData();
                                formData.append('file', audioBlob, 'audio.webm');
                                formData.append('model', 'whisper-large-v3');
                                formData.append('language', lang === 'vi-VN' ? 'vi' : 'en');
                                formData.append('temperature', '0');
                                if (promptContext) formData.append('prompt', promptContext);
                                formData.append('response_format', 'verbose_json');
                                formData.append('timestamp_granularities[]', 'word');

                                const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', { method: 'POST', headers: { 'Authorization': `Bearer ${groqKey}` }, body: formData });
                                if (!res.ok) throw new Error(`Lỗi Groq API (HTTP ${res.status})`);
                                const data = await res.json();
                                onResult(processTranscriptData(data).trim());

                            } else if (engine === 'local_whisper') {
                                const formData = new FormData();
                                formData.append('file', audioBlob, 'audio.webm');
                                formData.append('model', 'whisper-1');
                                formData.append('language', lang === 'vi-VN' ? 'vi' : 'en');
                                formData.append('temperature', '0');
                                if (promptContext) formData.append('prompt', promptContext);
                                formData.append('response_format', 'verbose_json');
                                formData.append('timestamp_granularities[]', 'word');
                                formData.append('word_timestamps', 'true');

                                let endpoint = localWhisperUrl.trim().replace('0.0.0.0', 'localhost');
                                if (!endpoint.endsWith('/v1/audio/transcriptions')) endpoint = endpoint.replace(/\/+$/, '') + '/v1/audio/transcriptions';

                                const res = await fetch(endpoint, { method: 'POST', headers: { 'Authorization': `Bearer local` }, body: formData });
                                if (!res.ok) throw new Error(`Lỗi Server Local (HTTP ${res.status})`);
                                const data = await res.json();
                                onResult(processTranscriptData(data).trim());

                            } else if (engine === 'fpt') {
                                const res = await fetch('https://api.fpt.ai/hmi/asr/general', { method: 'POST', headers: { 'api-key': fptKey }, body: audioBlob });
                                if (!res.ok) throw new Error(`Lỗi FPT.AI (HTTP ${res.status})`);
                                const data = await res.json();
                                if (data && data.hypotheses && data.hypotheses.length > 0) onResult(data.hypotheses[0].utterance.trim());
                                else onResult('');

                            } else if (engine === 'viettel') {
                                const formData = new FormData();
                                formData.append('file', audioBlob, 'audio.webm');
                                const res = await fetch('https://viettelgroup.ai/voice/api/asr/v1/rest/decode', { method: 'POST', headers: { 'token': viettelKey }, body: formData });
                                if (!res.ok) throw new Error(`Lỗi Viettel API (HTTP ${res.status})`);
                                const data = await res.json();
                                if (data && data.data && data.data[0] && data.data[0].text) onResult(data.data[0].text.trim());
                                else onResult('');

                            } else if (engine === 'google') {
                                const reader = new FileReader();
                                reader.readAsDataURL(audioBlob);
                                reader.onloadend = async () => {
                                    try {
                                        const base64Audio = reader.result.split(',')[1];
                                        const res = await fetch(`https://speech.googleapis.com/v1/speech:recognize?key=${googleKey}`, {
                                            method: 'POST',
                                            headers: { 'Content-Type': 'application/json' },
                                            body: JSON.stringify({
                                                config: { encoding: 'WEBM_OPUS', languageCode: lang === 'vi-VN' ? 'vi-VN' : 'en-US' },
                                                audio: { content: base64Audio }
                                            })
                                        });
                                        if (!res.ok) throw new Error(`Lỗi Google API (HTTP ${res.status})`);
                                        const data = await res.json();
                                        if (data.results && data.results.length > 0) onResult(data.results[0].alternatives[0].transcript.trim());
                                        else onResult('');
                                    } catch (e) { onError(e.message || "Lỗi kết nối Google API."); }
                                };
                            }
                        } catch (e) {
                            onError(e.message || "Lỗi kết nối API.");
                        }
                    };
                    mediaRecorder.start();
                } catch (err) {
                    onError("Không thể truy cập Micro. Vui lòng cấp quyền hoặc đảm bảo web chạy trên localhost/HTTPS.");
                }
            };

            const stopRecording = () => {
                if (browserRecRef.current) try { browserRecRef.current.stop(); } catch (e) { }
                if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') mediaRecorderRef.current.stop();
                setIsRecording(false);
            };

            const abortRecording = () => {
                if (browserRecRef.current) try { browserRecRef.current.stop(); } catch (e) { }
                if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') {
                    mediaRecorderRef.current.onstop = null;
                    mediaRecorderRef.current.stop();
                    clearInterval(vadIntervalRef.current);
                    if (audioContextRef.current && audioContextRef.current.state !== 'closed') audioContextRef.current.close().catch(() => { });
                }
                setIsRecording(false);
            };

            return useMemo(() => ({ isRecording, startRecording, stopRecording, abortRecording }), [isRecording, startRecording, stopRecording, abortRecording]);
        }

        function useLoopingAudio(text, rate = 1.0, delay = 400, voices = [], selectedVoiceURI = '') {
            const [isLooping, setIsLooping] = useState(false);
            const isLoopingRef = useRef(false);
            const timeoutRef = useRef(null);

            const createUtterance = useCallback((t, r) => {
                const u = new SpeechSynthesisUtterance(t);
                const v = voices.find(voice => voice.voiceURI === selectedVoiceURI);
                if (v) u.voice = v; else u.lang = 'en-US';
                u.rate = r;
                u.volume = 1.0;
                return u;
            }, [voices, selectedVoiceURI]);

            const stop = useCallback(() => {
                isLoopingRef.current = false;
                setIsLooping(false);
                clearTimeout(timeoutRef.current);
                window.speechSynthesis.cancel();
            }, []);

            const playOnce = useCallback((overrideText) => {
                stop();
                const u = createUtterance(overrideText || text, rate);
                window.speechSynthesis.speak(u);
            }, [text, rate, stop, createUtterance]);

            const playLoop = useCallback(() => {
                if (!isLoopingRef.current) return;
                window.speechSynthesis.cancel();
                const u = createUtterance(text, rate);
                u.onend = () => {
                    if (isLoopingRef.current) {
                        timeoutRef.current = setTimeout(() => { playLoopRef.current(); }, delay);
                    }
                };
                u.onerror = () => {
                    isLoopingRef.current = false;
                    setIsLooping(false);
                };
                window.speechSynthesis.speak(u);
            }, [text, rate, delay, createUtterance]);

            const playLoopRef = useRef(playLoop);
            useEffect(() => { playLoopRef.current = playLoop; }, [playLoop]);

            const toggleLoop = useCallback(() => {
                if (isLoopingRef.current) stop();
                else { isLoopingRef.current = true; setIsLooping(true); playLoop(); }
            }, [playLoop, stop]);

            const startLoop = useCallback(() => {
                if (!isLoopingRef.current) { isLoopingRef.current = true; setIsLooping(true); playLoop(); }
            }, [playLoop]);

            useEffect(() => { stop(); return stop; }, [text, stop]);

            return { isLooping, toggleLoop, startLoop, playOnce, stop };
        }

        function PronunciationStep({ word, onComplete, voices, selectedVoiceURI, audioRate, isHard, stepLabel, sttConfig, micStrictness, setPreviousTranscript }) {
            const [transcript, setTranscript] = useState('');
            const [matchStatus, setMatchStatus] = useState('idle');
            const [ipa, setIpa] = useState(null);
            const [speechError, setSpeechError] = useState(null);
            const [attempts, setAttempts] = useState(0);
            const { isLooping: isAudioPlaying, playOnce: playWord, stop: stopAudio } = useLoopingAudio(formatTextForSpeech(word.word), audioRate, 400, voices, selectedVoiceURI);
            const latestCheckMatch = useRef(null);

            const currentEngine = sttConfig.engineEn || 'browser';
            const isCloud = currentEngine !== 'browser';

            const mic = useCloudRecorder(
                { ...sttConfig, engine: currentEngine }, 'en-US', word.word,
                (text) => { setTranscript(text); if (latestCheckMatch.current) latestCheckMatch.current(text); },
                (err) => { setSpeechError(err); },
                (partialText) => { setTranscript(partialText); }
            );

            const handleRetry = useCallback(() => {
                setAttempts(prev => {
                    const next = prev + 1;
                    if (next >= MAX_VOICE_ATTEMPTS) { mic.abortRecording(); setTimeout(() => onComplete(false, false), 1500); }
                    return next;
                });
            }, [onComplete, mic]);

            const checkMatch = useCallback((spokenText) => {
                const cleanSpoken = normalizeSpeech(spokenText);
                const cleanTarget = normalizeSpeech(word.word);
                const spacelessSpoken = cleanSpoken.replace(/\s/g, '');
                const spacelessTarget = cleanTarget.replace(/\s/g, '');

                const similarity = getTextSimilarity(cleanSpoken, cleanTarget);
                const isMultiWordTarget = splitSpeechWords(cleanTarget).length > 1;
                const wordThreshold = micStrictness === 'easy' ? 0.78 : (micStrictness === 'hard' ? 0.92 : 0.86);

                }

        function MeaningVNStep({ word, wordsList, onComplete, stepLabel, silentMode, isHard, sttConfig, micStrictness, previousTranscript, setPreviousTranscript }) {
            const hasCompletedRef = useRef(false);
            const [inputMode, setInputMode] = useState(silentMode ? 'mcq' : 'voice');

            const [matchStatus, setMatchStatus] = useState('idle');
            const [options, setOptions] = useState([]);
            const [selected, setSelected] = useState(null);
            const [isCorrect, setIsCorrect] = useState(null);

            const latestCheckMatch = useRef(null);

            useEffect(() => {
                hasCompletedRef.current = false;
                if (!word.meaningVN) return;
                const otherMeanings = wordsList.filter((w) => w.id !== word.id && w.meaningVN).map((w) => w.meaningVN);
                const distractors = otherMeanings.sort(() => 0.5 - Math.random()).slice(0, 3);
                const allOptions = [...distractors, word.meaningVN].sort(() => 0.5 - Math.random());
                setOptions(allOptions);
                setSelected(null); setIsCorrect(null); setTranscript(''); setMatchStatus('idle'); setSpeechError(null);
            }, [word.id, wordsList]);

            const checkVoiceMatch = useCallback((spokenText) => {
                if (!spokenText || hasCompletedRef.current) return;
                const cleanSpoken = spokenText.toLowerCase().trim();
                const cleanTarget = (word.meaningVN || '').toLowerCase().trim();
                const targets = cleanTarget.split(/[,;-]/).map(s => s.trim()).filter(s => s.length > 0);
                let isExactMatch = false, maxSim = 0, hasOverlap = false;
                const spokenWords = cleanSpoken.split(/\s+/);
                for (let t of targets) {
                    if (cleanSpoken.includes(t) || t.includes(cleanSpoken)) { if (cleanSpoken.length >= 2 || t.length >= 2) { isExactMatch = true; break; } }
                    const sim = 1 - (getEditDistance(cleanSpoken, t) / Math.max(cleanSpoken.length, t.length));
                    if (sim > maxSim) maxSim = sim;
                    const tWords = t.split(/\s+/);
                    if (spokenWords.some(w => tWords.includes(w) && w.length > 1)) hasOverlap = true;
                }
                let threshold = micStrictness === 'easy' ? 0.60 : (micStrictness === 'hard' ? 0.85 : 0.75);
                if (isExactMatch || maxSim >= threshold) {
                    hasCompletedRef.current = true;
                    setMatchStatus('match'); if (setPreviousTranscript) setPreviousTranscript(null);
                    setTimeout(() => onComplete(true, false), 1200);
                } else if (hasOverlap || maxSim >= 0.2) {
                    setMatchStatus('partial'); if (setPreviousTranscript) setPreviousTranscript(spokenText);
                    setTimeout(() => setInputMode('mcq'), 1200);
                } else {
                    setMatchStatus('fail'); setInputMode('failed'); if (setPreviousTranscript) setPreviousTranscript(spokenText);
                    setTimeout(() => onComplete(false, true), 3000);
                }
            }, [word.meaningVN, onComplete, micStrictness, setPreviousTranscript]);

            useEffect(() => { latestCheckMatch.current = checkVoiceMatch; }, [checkVoiceMatch]);

            const currentEngine = sttConfig.engineVn || 'fpt';
            const isCloud = currentEngine !== 'browser';

            const mic = useCloudRecorder(
                { ...sttConfig, engine: currentEngine },
                'vi-VN',
                word.meaningVN,
                (text) => { setTranscript(text); if (latestCheckMatch.current) latestCheckMatch.current(text); },
                (err) => { setSpeechError(err); setTimeout(() => setInputMode('mcq'), 1200); },
                (partialText) => setTranscript(partialText)
            );

            const toggleListening = useCallback(() => {
                if (mic.isRecording) mic.abortRecording();
                else { setMatchStatus('idle'); setTranscript(''); mic.startRecording(); }
            }, [mic]);

            const handleMeaningSelect = useCallback((option, index) => {
                if (isCorrect !== null || hasCompletedRef.current) return;
                setSelected(index); const correct = (option === word.meaningVN);
                setIsCorrect(correct);
                if (correct) {
                    hasCompletedRef.current = true;
                    setTimeout(() => onComplete(true, false), 500);
                } else setTimeout(() => { setIsCorrect(null); setSelected(null); }, 500);
            }, [word.meaningVN, onComplete, isCorrect]);

            const handleIdk = useCallback(() => {
                if (hasCompletedRef.current) return;
                mic.abortRecording();

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (e.code === 'Space' && !e.repeat && inputMode === 'voice') { e.preventDefault(); toggleListening(); }
                    if (e.code === 'Enter' || e.code === 'NumpadEnter') { e.preventDefault(); handleIdk(); }

            }, [inputMode, options, toggleListening, handleIdk, handleMeaningSelect]);

            return (
                <div className="w-full h-full flex flex-col relative overflow-hidden bg-white dark:bg-gray-800">
                    <div className="flex-1 overflow-y-auto w-full p-4 sm:p-6 flex flex-col items-center custom-scroll">
                        <div className="mb-4 text-center w-full">
                            <div className="flex items-center justify-center gap-2 mb-1">
                                <span className="px-2 py-0.5 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-md text-[10px] font-bold uppercase tracking-wider">{word.pos}</span>
                                {isHard && <span className="px-2 py-0.5 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-md text-[10px] font-bold uppercase tracking-wider animate-pulse">🔥 Từ Khó</span>}
                            </div>
                            <div className="mt-1.5 inline-block px-3 py-1 bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-black text-[13px] sm:text-sm rounded-lg shadow-md tracking-wider uppercase">🎯 {stepLabel}</div>
                            <div className="flex justify-center items-center gap-2 mt-2"><strong className="text-xl text-indigo-700 dark:text-indigo-300">{capitalizeFirstLetter(word.word)}</strong></div>
                            <SpeechTrace trace={previousTranscript} />
                        </div>
                        {inputMode === 'voice' && (
                            <div className="w-full flex flex-col items-center mt-4">

                                    <div className="w-full bg-gray-50 dark:bg-gray-700/50 border border-gray-100 dark:border-gray-600 rounded-lg p-3 mb-3 text-center">
                                        <span className="text-gray-400 block text-[10px] uppercase mb-1">Máy nghe:</span>
                                        <span className={matchStatus === 'match' ? 'text-green-600 font-bold text-lg' : 'text-red-500 text-lg'}>"{transcript}"</span>
                                    </div>
                                )}
                                {!mic.isRecording && matchStatus === 'idle' && <button onClick={handleIdk} className="mt-4 px-4 py-2 text-xs font-bold text-gray-500 bg-gray-100 rounded-full hover:bg-gray-200"> 🤔 Không nhớ </button>}
                            </div>

                                        <span className="w-6 h-6 flex items-center justify-center bg-gray-100 rounded-md text-xs font-bold mr-3">{idx + 1}</span>{capitalizeFirstLetter(option)}
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>
                    <div className="h-[70px] border-t bg-white dark:bg-gray-800 flex items-center justify-center shrink-0">
                        {inputMode === 'voice' && <button onClick={toggleListening} className={`w-[60px] h-[60px] rounded-full flex items-center justify-center transition-all shadow-lg ${mic.isRecording ? 'bg-red-500 animate-pulse ring-4 ring-red-100' : (isCloud ? 'bg-orange-500 text-white' : 'bg-indigo-600 text-white')}`}>{mic.isRecording ? <MicOff size={24} /> : <Mic size={24} />}</button>}
                    </div>
                </div>
            );
        }

        function RootReflexStep({ word, onComplete, voices, selectedVoiceURI, audioRate, isHard, stepLabel, sttConfig, micStrictness, previousTranscript, setPreviousTranscript }) {
            const hasCompletedRef = useRef(false);
            const timerStartedAtRef = useRef(null);
            const [transcript, setTranscript] = useState('');
            const [matchStatus, setMatchStatus] = useState('idle');
            const [showHint, setShowHint] = useState(false);
            const [speechError, setSpeechError] = useState(null);
            const [attempts, setAttempts] = useState(0);
            const [isTestFinished, setIsTestFinished] = useState(false);
            const [finalResult, setFinalResult] = useState(null);
            const [timeLeftMs, setTimeLeftMs] = useState(ROOT_REFLEX_TIME_LIMIT_MS);
            const [reflexSpeed, setReflexSpeed] = useState(null);
            const [hardResolved, setHardResolved] = useState(false);

            const latestCheckMatch = useRef(null);
            const { isLooping: isAudioPlaying, startLoop, stop: stopAudio } = useLoopingAudio(formatTextForSpeech(word.word), audioRate, 800, voices, selectedVoiceURI);

            const currentEngine = sttConfig.engineEn || 'browser';
            const isCloud = currentEngine !== 'browser';

            const mic = useCloudRecorder(
                { ...sttConfig, engine: currentEngine },
                'en-US',
                word.word,
                (text) => { setTranscript(text); if (latestCheckMatch.current) latestCheckMatch.current(text); },
                (err) => { setSpeechError(err); },
                (partialText) => setTranscript(partialText)
            );

            useEffect(() => {
                hasCompletedRef.current = false;
                timerStartedAtRef.current = null;
                setMatchStatus('idle'); setTranscript(''); setSpeechError(null); setShowHint(false); setAttempts(0); setIsTestFinished(false); setFinalResult(null); setTimeLeftMs(ROOT_REFLEX_TIME_LIMIT_MS); setReflexSpeed(null); setHardResolved(false); stopAudio();
            }, [word.id, stopAudio]);

            useEffect(() => {
                if (!mic.isRecording || isTestFinished || hasCompletedRef.current) return;
                timerStartedAtRef.current = Date.now();
                setTimeLeftMs(ROOT_REFLEX_TIME_LIMIT_MS);

                const timer = setInterval(() => {
                    const elapsed = Date.now() - timerStartedAtRef.current;
                    const remaining = Math.max(0, ROOT_REFLEX_TIME_LIMIT_MS - elapsed);
                    setTimeLeftMs(remaining);
                    if (remaining <= 0 && !hasCompletedRef.current) {
                        hasCompletedRef.current = true;
                        clearInterval(timer);
                        setMatchStatus('no-match');
                        setIsTestFinished(true);
                        setFinalResult(false);
                        setShowHint(true);
                        setSpeechError("Chưa chuẩn!");

                        setTimeout(() => { stopAudio(); onComplete(false, false); }, 1500);
                    }

                return () => clearInterval(timer);
            }, [mic.isRecording, isTestFinished, onComplete, stopAudio]);

                setAttempts(prev => {

                        setIsTestFinished(true); setFinalResult(false); setShowHint(true);

                    } else { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(word.word); u.lang = 'en-US'; u.rate = audioRate; u.volume = 1.0; window.speechSynthesis.speak(u); }

                });

            const checkMatch = useCallback((spokenText) => {
                if (hasCompletedRef.current) return;
                const cleanSpoken = normalizeSpeech(spokenText);
                const cleanTarget = normalizeSpeech(word.word);
                const wordThreshold = micStrictness === 'easy' ? 0.78 : (micStrictness === 'hard' ? 0.92 : 0.86);
                const targetWords = splitSpeechWords(cleanTarget);
                const targetMatched = targetWords.length > 1
                    ? (hasExactSpeechPhrase(cleanSpoken, cleanTarget) || hasImportantWordCoverage(cleanSpoken, cleanTarget, wordThreshold))
                    : (hasExactSpeechPhrase(cleanSpoken, cleanTarget) || getTextSimilarity(cleanSpoken, cleanTarget) >= wordThreshold);

                if (setPreviousTranscript) setPreviousTranscript({ text: spokenText, target: word.word, step: stepLabel, passed: targetMatched && cleanTarget.length > 0 });

                if (targetMatched && cleanTarget.length > 0) {

                };

            }, [isTestFinished, toggleListening, handleNextStep]);

            return (
                <div className="w-full h-full flex flex-col relative overflow-hidden bg-white dark:bg-gray-800">
                    <div className="flex-1 overflow-y-auto w-full p-4 sm:p-6 flex flex-col items-center custom-scroll text-center">
                        <div className="mb-4 w-full flex flex-col items-center">
                            <div className="flex items-center justify-center gap-2 mb-1">
                                <span className="px-2 py-0.5 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-md text-[10px] font-bold uppercase tracking-wider">{word.pos}</span>
                                {isHard && <span className="px-2 py-0.5 bg-red-100 text-red-600 rounded-md text-[10px] font-bold uppercase tracking-wider animate-pulse">🔥 Từ Khó</span>}
                            </div>
                            <div className="mt-1.5 inline-block px-3 py-1 bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-black text-[13px] sm:text-sm rounded-lg shadow-md uppercase tracking-wider">🎯 {stepLabel}</div>
                            <h1 className="text-2xl sm:text-3xl font-bold text-indigo-800 dark:text-indigo-100 mt-2">{word.meaningVN}</h1>
                            <SpeechTrace trace={previousTranscript} />
                        </div>
                        {showHint && (
                            <div className="w-full bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-4 animate-pop shadow-inner">
                                <p className="text-[10px] text-yellow-600 font-bold uppercase mb-1">Đáp án:</p>
                                <p className="text-2xl font-bold text-indigo-700 tracking-wider">{capitalizeFirstLetter(word.word)}</p>
                                {isHard && <p className="mt-1 text-[11px] font-semibold text-yellow-700">Đọc lóng: {getAmBoi(guessIPA(word.word))}</p>}
                                <p className={`mt-2 text-xs font-bold ${finalResult ? 'text-green-600' : 'text-red-500'}`}>{finalResult ? 'Chính xác!' : 'Chưa chuẩn!'}</p>

                                {hardResolved && <p className="mt-1 text-[11px] font-bold text-green-700">Xử lý dứt điểm từ khó.</p>}
                            </div>

        function MeaningSynonymStep({ word, wordsList, onComplete, stepLabel, isHard, previousTranscript }) {

        function SynonymMeaningStep({ word, wordsList, onComplete, stepLabel, isHard, previousTranscript }) {
            const [options, setOptions] = useState([]);
            const [selected, setSelected] = useState(null);
            const [isCorrect, setIsCorrect] = useState(null);

                const distractors = otherMeanings.sort(() => 0.5 - Math.random()).slice(0, 3);
                const allOptions = [...distractors, word.meaningVN].sort(() => 0.5 - Math.random());
                setOptions(allOptions); setSelected(null); setIsCorrect(null); setHasFailed(false);
            }, [word, wordsList]);

            const handleMeaningSelect = useCallback((option, index) => {
                if (isCorrect) return;

                if (correct) setTimeout(() => onComplete(true, hasFailed), 500);
                else { setHasFailed(true); setTimeout(() => { setIsCorrect(null); setSelected(null); }, 500); }
            }, [word.meaningVN, onComplete, hasFailed, isCorrect]);

                                {isHard && <span className="px-2 py-0.5 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-md text-[10px] font-bold uppercase tracking-wider animate-pulse">🔥 Từ Khó</span>}
                            </div>
                            <div className="mt-1.5 inline-block px-3 py-1 bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-black text-[13px] sm:text-sm rounded-lg shadow-md tracking-wider uppercase ring-2 ring-indigo-200 dark:ring-indigo-900/50">🎯 {stepLabel}</div>
                            <div className="flex justify-center items-center gap-2 mt-2"><strong className="text-xl text-indigo-700 dark:text-indigo-300">{capitalizeFirstLetter(word.synonyms)}</strong></div>
                            <SpeechTrace trace={previousTranscript} />

                                    if (selected === idx) {
                                        if (isCorrect === true) btnClass = "bg-green-100 dark:bg-green-900/30 border-green-500 text-green-800 dark:text-green-300 font-bold shadow-md ring-2 ring-green-200 dark:ring-green-900/50";
                                        else if (isCorrect === false) btnClass = "bg-red-100 dark:bg-red-900/30 border-red-400 text-red-700 dark:text-red-300 animate-shake";
                                    } else if (isCorrect === false && option === word.meaningVN) btnClass = "bg-green-50 dark:bg-green-900/20 border-green-400 dark:border-green-700 text-green-700 dark:text-green-400 font-bold border-dashed";
                                    return (
                                        <button key={idx} onClick={() => handleMeaningSelect(option, idx)} className={`w-full p-4 rounded-xl flex items-center transition-all font-medium text-sm sm:text-base ${btnClass}`} disabled={isCorrect === true}>
                                            <span className="shrink-0 w-6 h-6 flex items-center justify-center bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 rounded-md text-xs font-bold mr-3 border border-gray-200 dark:border-gray-600">{idx + 1}</span>

                    <div className="h-[70px] w-full border-t border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-center px-4 sm:px-6 shrink-0 z-10 sm:rounded-b-2xl"><div className="w-full text-center text-xs text-gray-400 dark:text-gray-500 font-bold uppercase">Bấm số 1-4 trên bàn phím</div></div>
                </div>

        function DoubleReflexStep({ word, onComplete, voices, selectedVoiceURI, audioRate, isHard, stepLabel, sttConfig, micStrictness, previousTranscript, setPreviousTranscript }) {
            const [transcript, setTranscript] = useState('');
            const [matchStatus, setMatchStatus] = useState('idle');
            const [showHint, setShowHint] = useState(false);
            const [speechError, setSpeechError] = useState(null);
            const [attempts, setAttempts] = useState(0);
            const [isTestFinished, setIsTestFinished] = useState(false);
            const [finalResult, setFinalResult] = useState(null);

            const latestCheckMatch = useRef(null);
            const { isLooping: isAudioPlaying, startLoop, stop: stopAudio } = useLoopingAudio(formatTextForSpeech(word.word), audioRate, 800, voices, selectedVoiceURI);

            const currentEngine = sttConfig.engineEn || 'browser';
            const isCloud = currentEngine !== 'browser';

            const mic = useCloudRecorder(
                { ...sttConfig, engine: currentEngine }, 'en-US', word.word + ', ' + word.synonyms,
                (text) => { setTranscript(text); if (latestCheckMatch.current) latestCheckMatch.current(text); },
                (err) => { setSpeechError(err); },
                (partialText) => { setTranscript(partialText); }
            );

            useEffect(() => {
                setMatchStatus('idle'); setTranscript(''); setSpeechError(null); setShowHint(false); setAttempts(0); setIsTestFinished(false); setFinalResult(null); stopAudio();
            }, [word.meaningVN, stopAudio]);

            const playWord = useCallback(() => {
                window.speechSynthesis.cancel();
                const enVoice = voices.find((v) => v.voiceURI === selectedVoiceURI) || voices.find((v) => v.lang.startsWith('en')) || voices[0];
                const uEn = new SpeechSynthesisUtterance(`${word.word}. ${word.synonyms}`);
                uEn.lang = 'en-US'; uEn.rate = audioRate; if (enVoice) uEn.voice = enVoice;
                uEn.volume = 1.0; window.speechSynthesis.speak(uEn);
            }, [word.word, word.synonyms, voices, audioRate, selectedVoiceURI]);

            const handleRetry = useCallback(() => {
                setAttempts(prev => {
                    const next = prev + 1;
                    if (next >= MAX_VOICE_ATTEMPTS) {
                        setIsTestFinished(true); setFinalResult(false); setShowHint(true);
                        mic.abortRecording(); startLoop();
                    } else { playWord(); }
                    return next;
                });
            }, [onComplete, startLoop, playWord, mic]);

            const checkMatch = useCallback((spokenText) => {
                const cleanSpoken = normalizeSpeech(spokenText);
                const cleanTargetRoot = normalizeSpeech(word.word);
                const validSynonyms = word.synonyms.split(',').map((s) => normalizeSpeech(s.replace(/^"|"$/g, '')));
                const wordThreshold = micStrictness === 'easy' ? 0.78 : (micStrictness === 'hard' ? 0.92 : 0.86);
                const targetMatched = (target) => {
                    if (!target) return false;
                    const targetWords = splitSpeechWords(target);
                    return targetWords.length > 1
                        ? (hasExactSpeechPhrase(cleanSpoken, target) || hasImportantWordCoverage(cleanSpoken, target, wordThreshold))
                        : (hasExactSpeechPhrase(cleanSpoken, target) || getTextSimilarity(cleanSpoken, target) >= wordThreshold);
                };

                const rootMatched = targetMatched(cleanTargetRoot);
                const synMatched = validSynonyms.some((syn) => targetMatched(syn));

                const passed = rootMatched && synMatched;
                if (setPreviousTranscript) setPreviousTranscript({ text: spokenText, target: `${word.word}, ${word.synonyms}`, step: stepLabel, passed });

                if (passed) {
                    setMatchStatus('match'); setIsTestFinished(true); setFinalResult(true); setShowHint(true);
                    mic.abortRecording(); startLoop();
                    setTimeout(() => { stopAudio(); onComplete(true, false); }, 2500);
                } else {
                    setMatchStatus('no-match'); mic.abortRecording(); setShowHint(true); handleRetry();
                }
            }, [word.word, word.synonyms, stepLabel, startLoop, micStrictness, handleRetry, mic, stopAudio, onComplete, setPreviousTranscript]);

            useEffect(() => { latestCheckMatch.current = checkMatch; }, [checkMatch]);

            const handlePlayAudioToggle = () => { if (mic.isRecording) mic.abortRecording(); stopAudio(); startLoop(); };

            const toggleListening = useCallback(() => {
                if (isTestFinished || matchStatus === 'match') return;
                stopAudio(); window.speechSynthesis.cancel();
                if (mic.isRecording) mic.abortRecording();
                else { setMatchStatus('idle'); setTranscript(''); setSpeechError(null); mic.startRecording(); }
            }, [isTestFinished, matchStatus, mic, stopAudio]);

            const handleNextStep = useCallback(() => { stopAudio(); onComplete(finalResult, false); }, [stopAudio, onComplete, finalResult]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (isTestFinished && (e.code === 'Space' || e.code === 'Enter' || e.code === 'NumpadEnter')) { e.preventDefault(); handleNextStep(); return; }
                    if (!isTestFinished && e.code === 'Space' && !e.repeat) { e.preventDefault(); toggleListening(); }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isTestFinished, toggleListening, handleNextStep]);

            return (
                <div className="w-full h-full flex flex-col relative overflow-hidden bg-white dark:bg-gray-800">
                    <div className="flex-1 overflow-y-auto w-full p-4 sm:p-6 flex flex-col items-center custom-scroll text-center">
                        <div className="mb-4 w-full flex flex-col items-center relative">
                            <div className="flex items-center justify-center gap-2 flex-wrap mb-1">
                                <span className="px-2 py-0.5 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-md text-[10px] font-bold uppercase tracking-wider">{word.pos}</span>
                                {isHard && <span className="px-2 py-0.5 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-md text-[10px] font-bold uppercase tracking-wider animate-pulse">🔥 Từ Khó</span>}
                            </div>
                            <div className="flex flex-col items-center gap-1 mt-1">
                                <div className="inline-block px-3 py-1 bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-black text-[13px] sm:text-sm rounded-lg shadow-md tracking-wider uppercase ring-2 ring-indigo-200 dark:ring-indigo-900/50">🎯 {stepLabel}</div>
                                {!isTestFinished && <span className="text-[10px] font-bold text-indigo-500 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 px-2 py-0.5 rounded-md mt-1">Mic: {MAX_VOICE_ATTEMPTS - attempts}/{MAX_VOICE_ATTEMPTS}</span>}
                            </div>
                            <h1 className="text-2xl sm:text-3xl font-bold text-gray-800 dark:text-gray-100 mt-2">{word.meaningVN}</h1>
                            <SpeechTrace trace={previousTranscript} />
                        </div>

                        {showHint && (
                            <div className="w-full bg-yellow-50 dark:bg-yellow-900/30 border border-yellow-200 dark:border-yellow-700/50 rounded-lg p-4 mb-4 animate-in zoom-in shadow-inner">
                                <p className="text-[10px] text-yellow-600 dark:text-yellow-400 font-bold uppercase mb-1">Ghi nhớ cách phát âm này:</p>
                                <div className="flex items-center justify-center gap-2 mt-1">
                                    <p className="text-2xl font-bold text-indigo-700 dark:text-indigo-400 tracking-wider">{capitalizeFirstLetter(word.word)}</p>
                                    <p className="text-2xl font-bold text-blue-600 dark:text-blue-400 tracking-wider">{capitalizeFirstLetter(word.synonyms)}</p>
                                </div>
                                <p className={`mt-2 text-xs font-bold ${finalResult ? 'text-green-600' : 'text-red-500'}`}>{finalResult ? '🎉 Bạn đã phát âm đúng!' : '❌ Ghi nhận phát âm chưa chuẩn.'}</p>
                            </div>
                        )}

                        {(speechError || transcript) && (
                            <div className="w-full flex flex-col items-center mt-2 mb-2">
                                {speechError && <div className="w-full bg-orange-50 dark:bg-orange-900/20 border border-orange-200 dark:border-orange-800 text-orange-600 dark:text-orange-400 rounded-lg p-2 mb-2 text-xs font-semibold animate-fade-in flex items-center gap-2 shadow-sm"><AlertOctagon size={14} className="flex-shrink-0" /><span>{speechError}</span></div>}
                                {transcript && <div className="w-full bg-gray-50 dark:bg-gray-700/50 border border-gray-100 dark:border-gray-600 rounded-lg p-3 animate-fade-in text-xs text-center cursor-text select-all"><span className="text-gray-400 dark:text-gray-500 font-semibold block text-[10px] uppercase mb-1 pointer-events-none">Máy nghe:</span><span className={matchStatus === 'match' ? 'text-green-600 dark:text-green-400 font-bold text-lg' : 'text-red-500 dark:text-red-400 text-lg'}>{transcript}</span></div>}
                            </div>
                        )}

                        {!isTestFinished && matchStatus === 'no-match' && attempts > 0 && attempts < MAX_VOICE_ATTEMPTS && (
                            <div className="w-full mt-2 pt-2 border-t border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 text-[10px] font-bold flex items-center justify-center">Chưa chính xác. Còn {MAX_VOICE_ATTEMPTS - attempts} lần thử!</div>
                        )}
                        {!isTestFinished && isCloud && <div className="text-[10px] text-purple-500 font-bold animate-pulse mt-2">*Đang dùng API Tiếng Anh. Tự ngắt Mic khi dừng nói.</div>}
                    </div>

                    <div className="h-[70px] w-full border-t border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 flex items-center justify-center px-4 sm:px-6 shrink-0 z-10 sm:rounded-b-2xl">
                        <div className="flex flex-col items-center">
                            <button onClick={toggleListening} disabled={isAudioPlaying || matchStatus === 'match'} className={`h-[50px] w-[50px] rounded-full flex items-center justify-center transition-all shadow-lg flex-shrink-0 ${isAudioPlaying ? 'bg-gray-200 dark:bg-gray-700 text-gray-400 dark:text-gray-500 cursor-not-allowed opacity-70 shadow-none' : (mic.isRecording ? 'bg-red-500 text-white animate-pulse ring-4 ring-red-200 dark:ring-red-900/50 shadow-none' : (isCloud ? 'bg-purple-600 text-white hover:bg-purple-700' : 'bg-indigo-600 dark:bg-indigo-500 text-white hover:bg-indigo-700 dark:hover:bg-indigo-600 shadow-indigo-200 dark:shadow-none'))} active:scale-95`}>

                        </div>
                    </div>

        }
        // --- DASHBOARD VÀ APP ---
        function PomodoroBreak({ onResume }) {
            const [timeLeft, setTimeLeft] = useState(5 * 60);

            useEffect(() => {
                if (timeLeft <= 0) { onResume(); return; }
                const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft, onResume]);

            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;

            return (
                <div className="fixed inset-0 bg-indigo-900 z-50 flex flex-col items-center justify-center p-6 text-white animate-fade-in">

                </div>

                                                    {req.has('whisper') && (<div className="space-y-1"><label className="text-[10px] font-bold text-gray-500 uppercase">OpenAI API Key:</label><input type="password" value={openaiKey} onChange={(e) => setOpenaiKey(e.target.value)} placeholder="sk-..." className="w-full p-2.5 text-sm border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 focus:outline-none focus:border-indigo-500" /></div>)}

                                                    {req.has('local_whisper') && (<div className="space-y-1"><label className="text-[10px] font-bold text-gray-500 uppercase">URL Máy chủ Local:</label><input type="url" value={localWhisperUrl} onChange={(e) => setLocalWhisperUrl(e.target.value)} placeholder="http://localhost:8080" className="w-full p-2.5 text-sm border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 focus:outline-none focus:border-indigo-500" /></div>)}
